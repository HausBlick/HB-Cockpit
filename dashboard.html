<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieterportal | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F9FAF8',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { 'lg': '15px', 'xl': '15px', '2xl': '15px' },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.03)' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F9FAF8; font-size: 16px; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .nav-link { border-radius: 12px; transition: all 0.2s; cursor: pointer; }
        .nav-link:hover { background-color: #f3f4f6; color: #687451; }
        .active-link { background-color: #687451 !important; color: white !important; font-weight: 600; }
        
        input, select, textarea { border-radius: 12px; background-color: #F9FAF8; border: 1px solid #e5e7eb; transition: all 0.2s; padding: 12px 16px; }
        input:focus, select:focus, textarea:focus { background-color: white; border-color: #687451; outline: none; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); }
        
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0,0,0,0.02); }
        .btn-primary { background-color: #687451; color: white; border-radius: 12px; transition: all 0.2s; font-weight: 600; padding: 12px 24px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); }
        
        /* Zammad Style Ticket Sidebar */
        .ticket-sidebar-item { padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.2s; color: #6b7280; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .ticket-sidebar-item:hover { background: #f3f4f6; color: #374151; }
        .ticket-sidebar-item.active { background: #687451; color: white; }
        .ticket-count-badge { background: rgba(0,0,0,0.1); padding: 2px 8px; border-radius: 20px; font-size: 11px; }
        .ticket-sidebar-item.active .ticket-count-badge { background: rgba(255,255,255,0.2); }

        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }
        
        .dropdown-open { display: block !important; animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-sans text-hb-offblack min-h-screen flex flex-col md:flex-row text-left relative overflow-hidden" onclick="closeDropdowns(event)">

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- MOBILE HEADER -->
    <div class="md:hidden bg-white border-b border-gray-100 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-bold text-xl tracking-tight text-hb-olive flex items-center gap-2">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-8 w-auto">
            Mieterportal
        </div>
        <button onclick="toggleMenu()" class="text-hb-olive p-2 bg-gray-50 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
        </button>
    </div>

    <!-- MAIN SIDEBAR -->
    <nav id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 z-40 w-72 bg-white border-r border-gray-100 flex-shrink-0 h-screen flex flex-col shadow-soft">
        <div class="p-8 pb-4 hidden md:block text-center border-b border-gray-50 mb-4">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-10 w-auto mx-auto mb-2">
            <div class="font-extrabold text-xl tracking-tighter text-hb-olive">Mieterportal</div>
            <p class="text-[10px] uppercase tracking-widest font-bold text-gray-400">HB Verwaltung</p>
        </div>
        <div class="flex-grow p-4 overflow-y-auto">
            <ul class="space-y-1" id="nav-links"></ul>
        </div>
    </nav>
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-hb-offblack/20 backdrop-blur-sm z-30 hidden"></div>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-grow h-screen overflow-y-auto relative flex flex-col">
        <header class="p-6 md:p-10 flex justify-between items-center sticky top-0 bg-hb-ultralight/80 backdrop-blur-md z-30">
            <div>
                <p id="role-label" class="text-[10px] uppercase tracking-widest font-bold text-hb-orange mb-1"></p>
                <h1 id="welcome-title" class="text-2xl md:text-3xl font-extrabold tracking-tight">Lade...</h1>
            </div>
            
            <div class="relative dropdown-container">
                <button onclick="toggleUserDropdown(event)" class="flex items-center gap-3 bg-white p-1.5 pr-3 rounded-full border border-gray-200 shadow-sm hover:border-hb-olive transition-colors">
                    <div id="user-avatar" class="w-9 h-9 bg-hb-olive text-white rounded-full flex items-center justify-center font-bold text-sm uppercase">?</div>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-gray-100 z-50 overflow-hidden">
                    <div class="p-4 border-b border-gray-50">
                        <p class="text-sm font-bold truncate" id="dropdown-name">Name</p>
                        <p class="text-xs text-gray-400 truncate" id="dropdown-email">email</p>
                    </div>
                    <button onclick="loadProfile(); setActiveNav('');" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 flex items-center gap-3">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Profil bearbeiten
                    </button>
                    <button onclick="logout()" class="w-full text-left px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 flex items-center gap-3 border-t border-gray-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Abmelden
                    </button>
                </div>
            </div>
        </header>

        <div id="content-area" class="flex-grow px-6 md:px-10 pb-20 overflow-y-auto"></div>
    </main>

    <script>
        // === START: SETUP & GLOBALE VARIABLEN ===
        const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
        const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let userProfile = null;
        let currentEditingId = null;
        let currentEditingNewsId = null;
        let currentEditingContactId = null;
        
        let allNews = [];
        let allDocs = [];
        let allTickets = [];
        let buildings = [];
        let ticketView = { type: 'status', value: 'Neu' };

        const icons = {
            dashboard: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>`,
            news: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"></path></svg>`,
            tickets: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>`,
            users: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path></svg>`,
            buildings: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 21h18"></path><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path></svg>`,
            docs: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>`,
            contact: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>`
        };

        function toggleUserDropdown(e) { e.stopPropagation(); document.getElementById('user-dropdown').classList.toggle('hidden'); }
        function closeDropdowns(e) { if(!e.target.closest('.dropdown-container')) document.getElementById('user-dropdown').classList.add('hidden'); }
        function logout() { _supabase.auth.signOut().then(() => window.location.href = 'index.html'); }
        // === END: SETUP & GLOBALE VARIABLEN ===

        // === START: INIT & NAVIGATION ===
        async function init() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) { window.location.href = 'index.html'; return; }
                currentUser = user;

                const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                if (!profile) return;
                userProfile = profile;

                document.getElementById('welcome-title').textContent = "Hallo, " + profile.full_name.split(' ')[0] + "!";
                document.getElementById('role-label').textContent = profile.role === 'admin' ? 'Vermieter Cockpit' : 'Mieter Portal';
                document.getElementById('user-avatar').textContent = profile.full_name.charAt(0).toUpperCase();
                document.getElementById('dropdown-name').textContent = profile.full_name;
                document.getElementById('dropdown-email').textContent = profile.email;

                renderNav(profile.role);
                loadDashboard(); 
            } catch (err) { console.error(err); }
        }

        function renderNav(role) {
            const nav = document.getElementById('nav-links');
            const itemClass = "nav-link flex items-center gap-4 p-3.5 text-sm font-semibold text-hb-offblack";
            const sectionClass = "pt-6 pb-2 px-4 text-[10px] uppercase tracking-widest font-extrabold text-gray-400";
            
            if (role === 'admin') {
                nav.innerHTML = `
                    <li><a onclick="loadDashboard(); setActiveNav('nav-dash')" id="nav-dash" class="${itemClass} active-link">${icons.dashboard} Dashboard</a></li>
                    <li class="${sectionClass}">Kommunikation</li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Mieter-Tickets</a></li>
                    <li class="${sectionClass}">Verwaltung</li>
                    <li><a onclick="loadUserManagement(); setActiveNav('nav-users')" id="nav-users" class="${itemClass}">${icons.users} Mieter</a></li>
                    <li><a onclick="loadTenants(); setActiveNav('nav-apartments')" id="nav-apartments" class="${itemClass}">${icons.buildings} Objekte</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Dokumente</a></li>
                    <li><a onclick="loadContacts(); setActiveNav('nav-contact')" id="nav-contact" class="${itemClass}">${icons.contact} Kontaktbuch</a></li>
                `;
            } else {
                nav.innerHTML = `
                    <li><a onclick="loadDashboard(); setActiveNav('nav-dash')" id="nav-dash" class="${itemClass} active-link">${icons.dashboard} Dashboard</a></li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Meine Tickets</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Meine Dokumente</a></li>
                    <li><a onclick="loadContacts(); setActiveNav('nav-contact')" id="nav-contact" class="${itemClass}">${icons.contact} Kontaktbuch</a></li>
                `;
            }
        }
        // === END: INIT & NAVIGATION ===

        // === START: MODUL DASHBOARD ===
        async function loadDashboard() {
            const container = document.getElementById('content-area');
            const isAdmin = userProfile.role === 'admin';
            container.innerHTML = `<p class="text-gray-400 italic">Übersicht wird geladen...</p>`;

            if (isAdmin) {
                const [aptData, profData, tickData] = await Promise.all([
                    _supabase.from('apartments').select('id', { count: 'exact' }),
                    _supabase.from('profiles').select('id', { count: 'exact' }).eq('role', 'tenant'),
                    _supabase.from('tickets').select('id', { count: 'exact' }).neq('status', 'Geschlossen')
                ]);

                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div class="card p-8 flex flex-col justify-center cursor-pointer hover:border-hb-olive transition-all transform hover:-translate-y-1" onclick="loadTickets(); setActiveNav('nav-tickets')">
                            <div class="text-hb-orange mb-4">${icons.tickets}</div>
                            <h3 class="text-5xl font-extrabold">${tickData.count || 0}</h3>
                            <p class="text-xs uppercase tracking-widest font-bold text-gray-400 mt-2">Aktive Tickets</p>
                        </div>
                        <div class="card p-8 flex flex-col justify-center cursor-pointer hover:border-hb-olive transition-all transform hover:-translate-y-1" onclick="loadUserManagement(); setActiveNav('nav-users')">
                            <div class="text-hb-olive mb-4">${icons.users}</div>
                            <h3 class="text-5xl font-extrabold">${profData.count || 0}</h3>
                            <p class="text-xs uppercase tracking-widest font-bold text-gray-400 mt-2">Aktive Mieter</p>
                        </div>
                        <div class="card p-8 flex flex-col justify-center cursor-pointer hover:border-hb-olive transition-all transform hover:-translate-y-1" onclick="loadTenants(); setActiveNav('nav-apartments')">
                            <div class="text-hb-olive mb-4">${icons.buildings}</div>
                            <h3 class="text-5xl font-extrabold">${aptData.count || 0}</h3>
                            <p class="text-xs uppercase tracking-widest font-bold text-gray-400 mt-2">Einheiten</p>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `<div class="card p-10 bg-hb-olive text-white">Willkommen im Mieterportal!</div>`;
            }
        }
        // === END: MODUL DASHBOARD ===

        // === START: MODUL TICKETS (ZAMMAD STYLE) ===
        async function loadTickets() {
            const container = document.getElementById('content-area');
            const isAdmin = userProfile.role === 'admin';
            
            if (isAdmin) {
                container.innerHTML = `
                    <div class="flex flex-col md:flex-row h-[calc(100vh-250px)] gap-6">
                        <!-- Sidebar: Sichten & Objekte -->
                        <aside class="w-full md:w-64 flex-shrink-0 overflow-y-auto pr-2 chat-scroll">
                            <button onclick="openNewTicketModal()" class="btn-primary w-full mb-8 shadow-sm">+ Neues Ticket</button>
                            <div class="space-y-8">
                                <div>
                                    <h3 class="px-3 text-[10px] uppercase font-black tracking-widest text-gray-400 mb-3">Sichten</h3>
                                    <nav class="space-y-1" id="ticket-views-nav"></nav>
                                </div>
                                <div>
                                    <h3 class="px-3 text-[10px] uppercase font-black tracking-widest text-gray-400 mb-3">Objekte</h3>
                                    <nav class="space-y-1" id="ticket-buildings-nav"></nav>
                                </div>
                            </div>
                        </aside>
                        <!-- Main: Ticket Liste -->
                        <section class="flex-grow card overflow-hidden flex flex-col bg-white">
                            <div class="overflow-x-auto flex-grow">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-gray-50 border-b border-gray-100 text-[10px] uppercase font-black tracking-widest text-gray-400">
                                            <th class="p-5 w-16">ID</th>
                                            <th class="p-5">Betreff / Mieter</th>
                                            <th class="p-5">Objekt</th>
                                            <th class="p-5">Status</th>
                                            <th class="p-5 text-right">Datum</th>
                                        </tr>
                                    </thead>
                                    <tbody id="ticket-list-body" class="text-sm divide-y divide-gray-50"></tbody>
                                </table>
                            </div>
                            <div id="ticket-empty-state" class="hidden p-20 text-center text-gray-400 italic">Keine Tickets vorhanden.</div>
                        </section>
                    </div>
                `;
                fetchTickets();
            } else {
                container.innerHTML = `<div class="card p-8"><h2 class="text-xl font-extrabold mb-6">Meine Tickets</h2><div id="tenant-ticket-list" class="space-y-4"></div></div>`;
                fetchTickets();
            }
        }

        async function fetchTickets() {
            const isAdmin = userProfile.role === 'admin';
            if (isAdmin) {
                const { data: bData } = await _supabase.from('buildings').select('*').order('name');
                buildings = bData || [];
            }
            const { data, error } = await _supabase.from('tickets').select('*, profiles:tenant_id(full_name), buildings(name)').order('created_at', { ascending: false });
            if (!error) {
                allTickets = data;
                renderTicketSidebar();
                renderTicketList();
            }
        }

        function renderTicketSidebar() {
            const viewsNav = document.getElementById('ticket-views-nav');
            const bNav = document.getElementById('ticket-buildings-nav');
            if (!viewsNav) return;

            const views = [
                { id: 'Neu', label: 'Neu', count: allTickets.filter(t => t.status === 'Neu').length },
                { id: 'Offen', label: 'Offen', count: allTickets.filter(t => t.status === 'Offen' || t.status === 'In Bearbeitung').length },
                { id: 'Geschlossen', label: 'Abgeschlossen', count: allTickets.filter(t => t.status === 'Geschlossen' || t.status === 'Erledigt').length }
            ];

            viewsNav.innerHTML = views.map(v => `
                <div onclick="setTicketFilter('status', '${v.id}')" class="ticket-sidebar-item ${ticketView.type === 'status' && ticketView.value === v.id ? 'active' : ''}">
                    <span>${v.label}</span> <span class="ticket-count-badge">${v.count}</span>
                </div>
            `).join('');

            bNav.innerHTML = buildings.map(b => `
                <div onclick="setTicketFilter('building', '${b.id}')" class="ticket-sidebar-item ${ticketView.type === 'building' && ticketView.value == b.id ? 'active' : ''}">
                    <span class="truncate">${b.name}</span>
                </div>
            `).join('');
        }

        function setTicketFilter(type, value) {
            ticketView = { type, value };
            renderTicketSidebar();
            renderTicketList();
        }

        function renderTicketList() {
            const isAdmin = userProfile.role === 'admin';
            const body = document.getElementById('ticket-list-body');
            if (!body) return;

            let filtered = isAdmin ? allTickets.filter(t => {
                if (ticketView.type === 'status') {
                    if (ticketView.value === 'Geschlossen') return t.status === 'Geschlossen' || t.status === 'Erledigt';
                    if (ticketView.value === 'Offen') return t.status === 'Offen' || t.status === 'In Bearbeitung';
                    return t.status === ticketView.value;
                }
                return t.building_id == ticketView.value;
            }) : allTickets.filter(t => t.tenant_id === currentUser.id);

            body.innerHTML = filtered.map(t => `
                <tr onclick="viewTicketChat('${t.id}')" class="hover:bg-gray-50 cursor-pointer transition-colors group">
                    <td class="p-5 font-mono text-[10px] text-gray-400">#${t.id.substring(0,4)}</td>
                    <td class="p-5">
                        <div class="font-bold text-hb-offblack">${t.title}</div>
                        <div class="text-[11px] text-gray-400">${t.profiles?.full_name || 'Unbekannt'}</div>
                    </td>
                    <td class="p-5 text-xs text-gray-500 font-semibold">${t.buildings?.name || '-'}</td>
                    <td class="p-5"><span class="px-2.5 py-1 rounded-md text-[10px] font-black uppercase tracking-widest bg-hb-ultralight text-hb-olive border border-hb-olive/10">${t.status}</span></td>
                    <td class="p-5 text-right text-xs text-gray-400">${new Date(t.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }
        // === END: MODUL TICKETS ===

        // === START: MODUL OBJEKTE & MIETER ===
        async function loadTenants() {
            const container = document.getElementById('content-area');
            const { data: bData } = await _supabase.from('buildings').select('*').order('name');
            const options = bData?.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
            
            container.innerHTML = `
                <div class="card p-8 mb-8">
                    <h2 class="text-xl font-bold mb-6">Objekt anlegen</h2>
                    <form onsubmit="handleSaveBuilding(event)" class="flex gap-4">
                        <input type="text" id="b_name" placeholder="Name (z.B. Seestraße 10)" class="flex-grow" required>
                        <button type="submit" class="btn-primary">Speichern</button>
                    </form>
                </div>
                <div class="card p-8">
                    <h2 class="text-xl font-bold mb-6">Einheit anlegen</h2>
                    <form onsubmit="handleSaveApartment(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <select id="apt_b_id" required><option value="">Gebäude wählen...</option>${options}</select>
                        <input type="text" id="apt_no" placeholder="WE Nummer" required>
                        <button type="submit" class="btn-primary">Hinzufügen</button>
                    </form>
                </div>
            `;
        }
        
        async function handleSaveBuilding(e) {
            e.preventDefault();
            const name = document.getElementById('b_name').value;
            await _supabase.from('buildings').insert([{ name }]);
            showToast("Objekt gespeichert"); loadTenants();
        }

        async function handleSaveApartment(e) {
            e.preventDefault();
            const b_id = document.getElementById('apt_b_id').value;
            const apartment_number = document.getElementById('apt_no').value;
            await _supabase.from('apartments').insert([{ building_id: b_id, apartment_number }]);
            showToast("Einheit gespeichert"); loadTenants();
        }
        // === END: MODUL OBJEKTE & MIETER ===

        // === START: MODUL DOKUMENTE ===
        async function loadDocuments() {
            const container = document.getElementById('content-area');
            const isAdmin = userProfile.role === 'admin';
            container.innerHTML = `<div class="card p-8"><h2 class="text-xl font-bold">Dokumenten-Cloud</h2><div id="docs-list" class="mt-6 space-y-2"></div></div>`;
            const { data } = await _supabase.from('documents').select('*').order('created_at', { ascending: false });
            if(data) document.getElementById('docs-list').innerHTML = data.map(d => `
                <div class="p-4 border border-gray-100 rounded-xl flex justify-between items-center hover:bg-gray-50 transition-colors">
                    <div>
                        <p class="font-bold">${d.title}</p>
                        <p class="text-xs text-gray-400">${new Date(d.created_at).toLocaleString()}</p>
                    </div>
                    <button onclick="viewDoc('${d.id}', '${d.file_path}', '${JSON.stringify(d.read_by || [])}')" class="text-hb-olive font-bold text-sm">Ansehen</button>
                </div>
            `).join('') || '<p class="text-gray-400 italic">Keine Dokumente.</p>';
        }
        // === END: MODUL DOKUMENTE ===

        // === START: MODUL NEWS ===
        async function loadNews() {
            const container = document.getElementById('content-area');
            const isAdmin = userProfile.role === 'admin';
            let adminForm = isAdmin ? `<div class="card p-8 mb-8"><form onsubmit="handleSaveNews(event)" class="space-y-4"><input type="text" id="news_title" placeholder="Titel" class="w-full" required><textarea id="news_content" placeholder="Nachricht..." class="w-full" required></textarea><button type="submit" class="btn-primary">Veröffentlichen</button></form></div>` : '';
            container.innerHTML = adminForm + `<div id="news-feed" class="space-y-6"></div>`;
            const { data } = await _supabase.from('news').select('*').order('created_at', { ascending: false });
            if(data) document.getElementById('news-feed').innerHTML = data.map(n => `<div class="card p-8"><h3 class="text-xl font-bold">${n.title}</h3><p class="mt-4 text-gray-600">${n.content}</p></div>`).join('');
        }
        
        async function handleSaveNews(e) {
            e.preventDefault();
            const title = document.getElementById('news_title').value;
            const content = document.getElementById('news_content').value;
            await _supabase.from('news').insert([{ title, content, author_id: currentUser.id }]);
            showToast("News veröffentlicht"); loadNews();
        }
        // === END: MODUL NEWS ===

        init();
    </script>
</body>
</html>
