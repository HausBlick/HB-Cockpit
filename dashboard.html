<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieterportal | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F9FAF8',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { 'lg': '15px', 'xl': '15px', '2xl': '15px' },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.03)' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F9FAF8; font-size: 16px; color: #373737; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .nav-link { border-radius: 12px; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; color: #373737; }
        .nav-link:hover { background-color: #f3f4f6; color: #687451; }
        .active-link { background-color: #687451 !important; color: white !important; }
        .nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; color: #9ca3af; padding: 24px 16px 8px 16px; }
        
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0,0,0,0.02); }
        .dropdown-open { display: block !important; animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Form Elements */
        input, select, textarea { border-radius: 12px; background-color: #F9FAF8; border: 1px solid #e5e7eb; transition: all 0.2s; padding: 12px 16px; width: 100%; font-size: 14px; }
        input:focus, select:focus, textarea:focus { background-color: white; border-color: #687451; outline: none; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); }
        input[type="checkbox"] { width: auto; accent-color: #687451; width: 1.2rem; height: 1.2rem; cursor: pointer; border-radius: 4px; }
        
        .btn-primary { background-color: #687451; color: white; border-radius: 12px; transition: all 0.2s; font-weight: 600; padding: 12px 24px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); }
        .btn-secondary { background-color: #e5e7eb; color: #374151; border-radius: 12px; transition: all 0.2s; font-weight: 600; padding: 12px 24px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .btn-secondary:hover { background-color: #d1d5db; }

        /* Hide scrollbar for tabs but keep functionality */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col md:flex-row text-left relative overflow-hidden" onclick="closeDropdowns(event)">

    <!-- === START: UI BASIS ELEMENTE === -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none text-left"></div>

    <!-- Mobile Header -->
    <div class="md:hidden bg-white border-b border-gray-100 p-4 flex justify-between items-center sticky top-0 z-50 text-left">
        <div class="font-bold text-xl tracking-tight text-hb-olive flex items-center gap-2">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-8 w-auto">
            Mieterportal
        </div>
        <button onclick="toggleMenu()" class="text-hb-olive p-2 bg-gray-50 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
        </button>
    </div>
    <!-- === END: UI BASIS ELEMENTE === -->

    <!-- === START: MODUL SIDEBAR === -->
    <nav id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 z-40 w-72 bg-white border-r border-gray-100 flex-shrink-0 h-screen flex flex-col shadow-soft text-left">
        <div class="p-8 pb-4 hidden md:block text-center border-b border-gray-50 mb-4">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-10 w-auto mx-auto mb-2">
            <div class="font-extrabold text-xl tracking-tighter text-hb-olive">Mieterportal</div>
            <p class="text-[10px] uppercase tracking-widest font-bold text-gray-400">HB Verwaltung</p>
        </div>
        <div class="flex-grow p-4 overflow-y-auto chat-scroll">
            <ul class="space-y-1" id="nav-links">
                <!-- Navigations-Links werden per renderNav() eingefügt -->
            </ul>
        </div>
    </nav>
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-hb-offblack/20 backdrop-blur-sm z-30 hidden text-left"></div>
    <!-- === END: MODUL SIDEBAR === -->

    <!-- === START: MAIN VIEWPORT === -->
    <main class="flex-grow h-screen overflow-y-auto relative flex flex-col text-left">
        <!-- Header -->
        <header class="p-6 md:p-10 flex justify-between items-center sticky top-0 bg-hb-ultralight/80 backdrop-blur-md z-30 text-left">
            <div class="text-left">
                <p id="role-label" class="text-[10px] uppercase tracking-widest font-bold text-hb-orange mb-1"></p>
                <h1 id="welcome-title" class="text-2xl md:text-3xl font-extrabold tracking-tight">Lade...</h1>
            </div>
            
            <!-- User Menu -->
            <div class="relative dropdown-container text-left">
                <button onclick="toggleUserDropdown(event)" class="flex items-center gap-3 bg-white p-1.5 pr-3 rounded-full border border-gray-200 shadow-sm hover:border-hb-olive transition-colors">
                    <div id="user-avatar" class="w-9 h-9 bg-hb-olive text-white rounded-full flex items-center justify-center font-bold text-sm uppercase">?</div>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-gray-100 z-50 overflow-hidden text-left">
                    <div class="p-4 border-b border-gray-50 text-left">
                        <p class="text-sm font-bold truncate text-left" id="dropdown-name">Name</p>
                        <p class="text-xs text-gray-400 truncate text-left" id="dropdown-email">email</p>
                    </div>
                    <button onclick="loadProfile();" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 flex items-center gap-3 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Profil bearbeiten
                    </button>
                    <button onclick="logout()" class="w-full text-left px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 flex items-center gap-3 border-t border-gray-50 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Abmelden
                    </button>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="content-area" class="flex-grow px-6 md:px-10 pb-20 overflow-y-auto text-left">
            <!-- Inhalte werden hier geladen -->
        </div>
    </main>
    <!-- === END: MAIN VIEWPORT === -->

    <script>
        // === START: SETUP & GLOBALE VARIABLEN ===
        const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
        const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let userProfile = null;

        // Globale Variablen für das Objekte-Modul
        let currentBuildings = [];
        let selectedBuildingId = null;
        let currentApartments = [];

        const icons = {
            dashboard: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>`,
            news: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"></path></svg>`,
            tickets: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>`,
            users: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path></svg>`,
            buildings: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 21h18"></path><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path></svg>`,
            docs: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>`,
            contact: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>`,
            finance: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 8c-1.657 0-3 1.343-3 3s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3z"></path><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z"></path></svg>`,
            settings: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><circle cx="12" cy="12" r="3"></circle></svg>`
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-hb-orange' : 'bg-hb-olive';
            toast.className = `${bgColor} text-white px-6 py-4 rounded-xl shadow-xl flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0 z-50`;
            toast.innerHTML = `<span class="text-sm font-bold">${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function toggleUserDropdown(e) { e.stopPropagation(); document.getElementById('user-dropdown').classList.toggle('hidden'); }
        function closeDropdowns(e) { if(!e.target.closest('.dropdown-container')) document.getElementById('user-dropdown').classList.add('hidden'); }
        function logout() { _supabase.auth.signOut().then(() => window.location.href = 'index.html'); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('overlay').classList.toggle('hidden'); }
        
        // Globale Funktion für die Tabs in der Einheiten-Maske
        window.switchAptTab = function(tabId) {
            document.querySelectorAll('.apt-tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.apt-tab-btn').forEach(el => {
                el.classList.remove('border-hb-olive', 'text-hb-olive');
                el.classList.add('border-transparent', 'text-gray-500');
            });
            
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            const activeBtn = document.getElementById('btn-tab-' + tabId);
            if(activeBtn) {
                activeBtn.classList.remove('border-transparent', 'text-gray-500');
                activeBtn.classList.add('border-hb-olive', 'text-hb-olive');
            }
        };
        // === END: SETUP & GLOBALE VARIABLEN ===

        // === START: INIT & NAVIGATION ===
        async function init() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) { window.location.href = 'index.html'; return; }
                currentUser = user;

                const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                if (!profile) return;
                userProfile = profile;

                document.getElementById('welcome-title').textContent = "Hallo, " + profile.full_name.split(' ')[0] + "!";
                
                // Rollen-Label Anzeige
                const roleLabels = { 'admin': 'Verwalter Cockpit', 'manager': 'Objektbetreuer', 'owner': 'Eigentümer Cockpit', 'tenant': 'Mieter Portal' };
                document.getElementById('role-label').textContent = roleLabels[profile.role] || 'Nutzer Portal';
                
                document.getElementById('user-avatar').textContent = profile.full_name.charAt(0).toUpperCase();
                document.getElementById('dropdown-name').textContent = profile.full_name;
                document.getElementById('dropdown-email').textContent = profile.email;

                renderNav(profile.role);
                loadDashboard(); 
            } catch (err) { console.error(err); }
        }

        function renderNav(role) {
            const nav = document.getElementById('nav-links');
            let html = `<li><a onclick="loadDashboard(); setActiveNav(this)" class="nav-link active-link">${icons.dashboard} Dashboard</a></li>`;

            if (role === 'admin' || role === 'manager') {
                html += `<li class="nav-section-title">Kommunikation</li>`;
                html += `<li><a onclick="loadNews(); setActiveNav(this)" class="nav-link">${icons.news} Schwarzes Brett</a></li>`;
                html += `<li><a onclick="loadTickets(); setActiveNav(this)" class="nav-link">${icons.tickets} Ticket System</a></li>`;

                html += `<li class="nav-section-title">Verwaltung</li>`;
                html += `<li><a onclick="loadUserManagement(); setActiveNav(this)" class="nav-link">${icons.users} Personen</a></li>`;
                html += `<li><a onclick="loadTenants(); setActiveNav(this)" class="nav-link">${icons.buildings} Bestands-Objekte</a></li>`;

                html += `<li class="nav-section-title">Finanzen</li>`;
                html += `<li><a onclick="loadFinance(); setActiveNav(this)" class="nav-link">${icons.finance} Abrechnungen</a></li>`;

                html += `<li class="nav-section-title">Service & Dokumente</li>`;
                html += `<li><a onclick="loadDocuments(); setActiveNav(this)" class="nav-link">${icons.docs} Dokumenten Cloud</a></li>`;
                html += `<li><a onclick="loadContacts(); setActiveNav(this)" class="nav-link">${icons.contact} Kontaktbuch</a></li>`;
                html += `<li><a onclick="loadSettings(); setActiveNav(this)" class="nav-link">${icons.settings} Einstellungen</a></li>`;
            } 
            else if (role === 'owner') {
                html += `<li class="nav-section-title">Mein Asset</li>`;
                html += `<li><a onclick="loadMyUnits(); setActiveNav(this)" class="nav-link">${icons.buildings} Meine Einheiten</a></li>`;
                html += `<li><a onclick="loadDocuments(); setActiveNav(this)" class="nav-link">${icons.docs} Dokumente</a></li>`;
                html += `<li><a onclick="loadTickets(); setActiveNav(this)" class="nav-link">${icons.tickets} Meine Tickets</a></li>`;
                
                // (Optional: Vermieter-Zusatzfunktionen)
                html += `<li class="nav-section-title">Vermieter-Bereich</li>`;
                html += `<li><a onclick="loadMyTenants(); setActiveNav(this)" class="nav-link">${icons.users} Meine Mieter</a></li>`;
                html += `<li><a onclick="loadContacts(); setActiveNav(this)" class="nav-link">${icons.contact} Kontaktbuch</a></li>`;
            } 
            else { // role === 'tenant'
                html += `<li class="nav-section-title">Kommunikation</li>`;
                html += `<li><a onclick="loadNews(); setActiveNav(this)" class="nav-link">${icons.news} Schwarzes Brett</a></li>`;
                html += `<li><a onclick="loadTickets(); setActiveNav(this)" class="nav-link">${icons.tickets} Meine Meldungen</a></li>`;

                html += `<li class="nav-section-title">Service & Dokumente</li>`;
                html += `<li><a onclick="loadDocuments(); setActiveNav(this)" class="nav-link">${icons.docs} Meine Dokumente</a></li>`;
                html += `<li><a onclick="loadContacts(); setActiveNav(this)" class="nav-link">${icons.contact} Kontaktbuch</a></li>`;
            }

            nav.innerHTML = html;
        }

        function setActiveNav(el) {
            document.querySelectorAll('#nav-links a').forEach(a => a.classList.remove('active-link'));
            el.classList.add('active-link');
            if(window.innerWidth < 768) toggleMenu();
        }
        // === END: INIT & NAVIGATION ===

        // === START: MODUL DASHBOARD ===
        async function loadDashboard() {
            const container = document.getElementById('content-area');
            container.innerHTML = `
                <div class="p-10 card text-center">
                    <h2 class="text-xl font-bold mb-2">Willkommen im Dashboard</h2>
                    <p class="text-gray-500">Wähle einen Menüpunkt aus der Sidebar, um zu starten.</p>
                </div>
            `;
        }
        // === END: MODUL DASHBOARD ===

        // === START: MODUL TICKETS ===
        async function loadTickets() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Tickets</h2><p class="text-gray-400 italic">Hier wird als nächstes das Zammad-System aufgebaut...</p>`;
        }
        // === END: MODUL TICKETS ===

        // === START: MODUL NEWS ===
        async function loadNews() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Schwarzes Brett</h2><p class="text-gray-400 italic">Wird in Kürze implementiert...</p>`;
        }
        // === END: MODUL NEWS ===

        // === START: MODUL DOKUMENTE ===
        async function loadDocuments() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Dokumente</h2><p class="text-gray-400 italic">Hier kommt das neue Dateisystem-Design hin...</p>`;
        }
        // === END: MODUL DOKUMENTE ===

        // === START: MODUL OBJEKTE ===
        async function loadTenants() {
            const container = document.getElementById('content-area');
            container.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-6 h-[calc(100vh-140px)]">
                    
                    <!-- Linke Spalte: Gebäude-Liste -->
                    <div class="w-full lg:w-1/3 flex flex-col gap-4 h-full">
                        <div class="card flex flex-col h-full overflow-hidden border border-gray-100">
                            <div class="p-5 border-b border-gray-50 flex justify-between items-center bg-gray-50/50">
                                <h2 class="text-sm font-black uppercase tracking-widest text-gray-500">Immobilienbestand</h2>
                                <button onclick="showBuildingForm()" class="bg-hb-olive text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-opacity-80 shadow-sm transition-transform hover:scale-105" title="Neues Gebäude anlegen">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                                </button>
                            </div>
                            <div id="buildings-list" class="flex-grow overflow-y-auto p-3 space-y-2 chat-scroll">
                                <p class="text-sm text-gray-400 italic text-center mt-10">Lade Gebäude...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Rechte Spalte: Gebäude-Details & Einheiten -->
                    <div class="w-full lg:w-2/3 flex flex-col h-full" id="units-area">
                        <div class="card p-10 flex flex-col items-center justify-center text-gray-400 h-full border border-gray-100 bg-gray-50/20">
                            <svg class="w-16 h-16 text-gray-200 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                            <p class="font-medium text-lg text-gray-500">Bitte wähle links ein Objekt aus</p>
                            <p class="text-sm mt-2">oder erstelle ein neues Gebäude über das Plus-Symbol.</p>
                        </div>
                    </div>
                </div>
            `;
            await fetchBuildingsList();
        }

        async function fetchBuildingsList() {
            const list = document.getElementById('buildings-list');
            const { data, error } = await _supabase.from('buildings').select('*').order('name');
            
            if (error) {
                list.innerHTML = `<p class="text-red-500 text-sm p-4">Fehler: ${error.message}</p>`;
                return;
            }
            
            currentBuildings = data || [];
            
            if (currentBuildings.length === 0) {
                list.innerHTML = `<p class="text-sm text-gray-400 italic text-center mt-10">Keine Objekte angelegt.</p>`;
                return;
            }

            list.innerHTML = currentBuildings.map(b => `
                <div onclick="selectBuilding(${b.id})" id="b-item-${b.id}" class="p-4 rounded-xl cursor-pointer transition-all border border-transparent hover:border-gray-200 hover:bg-gray-50">
                    <h3 class="font-bold text-hb-offblack">${b.name}</h3>
                    <p class="text-xs text-gray-500 truncate mt-1">${b.address || 'Keine Adresse'}</p>
                </div>
            `).join('');

            // Falls bereits ein Objekt markiert war, Markierung beibehalten
            if(selectedBuildingId) highlightSelectedBuilding(selectedBuildingId);
        }

        function highlightSelectedBuilding(id) {
            document.querySelectorAll('[id^="b-item-"]').forEach(el => {
                el.classList.remove('bg-hb-olive', 'text-white', 'hover:bg-hb-olive');
                el.classList.add('hover:bg-gray-50');
                const title = el.querySelector('h3');
                const subtitle = el.querySelector('p');
                if(title) title.classList.replace('text-white', 'text-hb-offblack');
                if(subtitle) subtitle.classList.replace('text-white/80', 'text-gray-500');
            });

            const selected = document.getElementById(`b-item-${id}`);
            if (selected) {
                selected.classList.remove('hover:bg-gray-50', 'border-transparent');
                selected.classList.add('bg-hb-olive', 'shadow-md');
                selected.querySelector('h3').classList.replace('text-hb-offblack', 'text-white');
                selected.querySelector('p').classList.replace('text-gray-500', 'text-white/80');
            }
        }

        async function selectBuilding(id) {
            selectedBuildingId = id;
            highlightSelectedBuilding(id);
            const building = currentBuildings.find(b => b.id === id);
            const area = document.getElementById('units-area');

            area.innerHTML = `
                <div class="card h-full flex flex-col border border-gray-100 shadow-sm overflow-hidden">
                    <!-- Gebäude Header -->
                    <div class="p-6 border-b border-gray-50 bg-white flex justify-between items-start">
                        <div>
                            <h2 class="text-2xl font-extrabold text-hb-offblack tracking-tight">${building.name}</h2>
                            <p class="text-sm text-gray-500 mt-1">${building.address || 'Keine Adresse hinterlegt'}</p>
                            <div class="flex gap-4 mt-3 text-xs font-bold text-gray-400 uppercase tracking-widest">
                                <span>Baujahr: ${building.construction_year || '-'}</span>
                                <span>Heizung: ${building.heating_type || '-'}</span>
                            </div>
                        </div>
                        <button onclick="showBuildingForm(${building.id})" class="text-xs font-bold text-hb-olive hover:underline bg-hb-ultralight px-3 py-1.5 rounded-lg">Gebäude bearbeiten</button>
                    </div>
                    
                    <!-- Einheiten Toolbar -->
                    <div class="px-6 py-4 bg-gray-50/50 border-b border-gray-50 flex justify-between items-center">
                        <h3 class="text-sm font-black uppercase tracking-widest text-gray-500">Zugehörige Einheiten</h3>
                        <button onclick="showApartmentForm()" class="btn-primary py-2 px-4 text-xs shadow-sm">+ Einheit hinzufügen</button>
                    </div>

                    <!-- Einheiten Liste -->
                    <div class="flex-grow overflow-y-auto p-6 bg-[#f4f5f1] chat-scroll" id="apartments-list">
                        <p class="text-sm text-gray-400 italic text-center mt-10">Lade Einheiten...</p>
                    </div>
                </div>
            `;
            await fetchApartmentsForBuilding(id);
        }

        async function fetchApartmentsForBuilding(bId) {
            const list = document.getElementById('apartments-list');
            const { data, error } = await _supabase.from('apartments').select('*').eq('building_id', bId).order('apartment_number');
            
            if (error) { list.innerHTML = `<p class="text-red-500 text-sm">Fehler: ${error.message}</p>`; return; }
            
            currentApartments = data || [];

            if (currentApartments.length === 0) {
                list.innerHTML = `<p class="text-sm text-gray-400 italic text-center mt-10">Diesem Gebäude sind noch keine Einheiten zugeordnet.</p>`;
                return;
            }

            list.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">` + currentApartments.map(apt => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:border-hb-olive transition-colors relative group">
                    <div class="flex justify-between items-start mb-3">
                        <span class="bg-gray-100 text-gray-600 text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-md">${apt.type || 'Wohnen'}</span>
                        <button onclick="showApartmentForm(${apt.id})" class="text-xs font-bold text-hb-olive opacity-0 group-hover:opacity-100 transition-opacity hover:underline">Bearbeiten</button>
                    </div>
                    <h4 class="text-lg font-extrabold text-hb-offblack">${apt.apartment_number}</h4>
                    <p class="text-sm font-medium text-gray-500 mt-1">${apt.floor ? apt.floor + ' • ' : ''}${apt.rooms ? apt.rooms + ' Zi. • ' : ''}${apt.sq_meters || 0} m²</p>
                    
                    <div class="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-gray-50">
                        <div><p class="text-[10px] uppercase font-bold text-gray-400">Kaltmiete</p><p class="text-sm font-semibold">${apt.rent_amount || 0} €</p></div>
                        <div><p class="text-[10px] uppercase font-bold text-gray-400">Nebenkosten</p><p class="text-sm font-semibold">${apt.utilities_amount || 0} €</p></div>
                        <div><p class="text-[10px] uppercase font-bold text-gray-400">MEA</p><p class="text-sm font-semibold">${apt.mea || '-'}</p></div>
                    </div>
                </div>
            `).join('') + `</div>`;
        }

        // --- Formular: Gebäude (Neu / Edit) ---
        function showBuildingForm(id = null) {
            const area = document.getElementById('units-area');
            let b = id ? currentBuildings.find(x => x.id === id) : {};
            const isEdit = !!id;

            area.innerHTML = `
                <div class="card p-8 h-full overflow-y-auto border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-2xl font-extrabold text-hb-offblack tracking-tight">${isEdit ? 'Gebäude bearbeiten' : 'Neues Gebäude anlegen'}</h2>
                        <button onclick="selectedBuildingId ? selectBuilding(selectedBuildingId) : loadTenants()" class="text-xs font-bold text-gray-400 uppercase tracking-widest hover:text-hb-orange">Abbrechen</button>
                    </div>
                    
                    <form id="building-form" class="space-y-6 max-w-2xl">
                        <input type="hidden" id="b_form_id" value="${b.id || ''}">
                        
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Bezeichnung des Objekts *</label>
                            <input type="text" id="b_form_name" value="${b.name || ''}" placeholder="z.B. Seestraße 10" required>
                        </div>
                        
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Vollständige Adresse</label>
                            <input type="text" id="b_form_address" value="${b.address || ''}" placeholder="Musterstraße 1, 12345 Musterstadt">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Baujahr</label>
                                <input type="number" id="b_form_year" value="${b.construction_year || ''}" placeholder="YYYY">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Heizungsart</label>
                                <input type="text" id="b_form_heating" value="${b.heating_type || ''}" placeholder="z.B. Gas-Zentralheizung">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Interne Notizen (Nur Verwaltung)</label>
                            <textarea id="b_form_notes" rows="4" placeholder="Besonderheiten, Hausmeister-Infos...">${b.notes || ''}</textarea>
                        </div>

                        <div class="pt-6 flex gap-4">
                            <button type="submit" class="btn-primary w-full md:w-auto">Gebäude speichern</button>
                            ${isEdit ? `<button type="button" onclick="deleteBuilding(${b.id})" class="btn-secondary text-red-500 hover:bg-red-50 hover:text-red-600 bg-white border border-red-100">Gebäude löschen</button>` : ''}
                        </div>
                    </form>
                </div>
            `;

            document.getElementById('building-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const payload = {
                    name: document.getElementById('b_form_name').value,
                    address: document.getElementById('b_form_address').value,
                    construction_year: document.getElementById('b_form_year').value || null,
                    heating_type: document.getElementById('b_form_heating').value,
                    notes: document.getElementById('b_form_notes').value
                };

                const fId = document.getElementById('b_form_id').value;
                let res;
                if (fId) res = await _supabase.from('buildings').update(payload).eq('id', fId);
                else res = await _supabase.from('buildings').insert([payload]).select('id').single();

                if (res.error) { showToast(res.error.message, "error"); } 
                else { 
                    showToast("Gebäude erfolgreich gespeichert!"); 
                    await fetchBuildingsList();
                    selectBuilding(fId ? fId : res.data.id);
                }
            });
        }

        async function deleteBuilding(id) {
            if(confirm("Möchten Sie dieses Gebäude wirklich löschen? ACHTUNG: Alle zugehörigen Einheiten werden ebenfalls gelöscht!")) {
                const {error} = await _supabase.from('buildings').delete().eq('id', id);
                if(error) showToast(error.message, "error");
                else {
                    showToast("Gebäude gelöscht");
                    selectedBuildingId = null;
                    loadTenants();
                }
            }
        }

        // --- Formular: Einheit (Neu / Edit) mit TABS ---
        function showApartmentForm(id = null) {
            const area = document.getElementById('units-area');
            let apt = id ? currentApartments.find(x => x.id === id) : {};
            const isEdit = !!id;

            area.innerHTML = `
                <div class="card p-8 h-full overflow-y-auto border border-gray-100 shadow-sm flex flex-col">
                    <div class="flex justify-between items-center mb-6 flex-shrink-0">
                        <h2 class="text-2xl font-extrabold text-hb-offblack tracking-tight">${isEdit ? 'Einheit bearbeiten' : 'Neue Einheit anlegen'}</h2>
                        <button onclick="selectBuilding(selectedBuildingId)" class="text-xs font-bold text-gray-400 uppercase tracking-widest hover:text-hb-orange">Zurück zur Übersicht</button>
                    </div>

                    <!-- Tab Navigation -->
                    <div class="flex overflow-x-auto border-b border-gray-200 mb-6 gap-8 hide-scrollbar flex-shrink-0">
                        <button type="button" id="btn-tab-base" onclick="switchAptTab('base')" class="apt-tab-btn whitespace-nowrap pb-3 border-b-2 font-bold text-sm transition-colors border-hb-olive text-hb-olive">Stammdaten</button>
                        <button type="button" id="btn-tab-finance" onclick="switchAptTab('finance')" class="apt-tab-btn whitespace-nowrap pb-3 border-b-2 font-bold text-sm transition-colors border-transparent text-gray-500 hover:text-gray-700">Finanzen</button>
                        <button type="button" id="btn-tab-apportionment" onclick="switchAptTab('apportionment')" class="apt-tab-btn whitespace-nowrap pb-3 border-b-2 font-bold text-sm transition-colors border-transparent text-gray-500 hover:text-gray-700">Umlageschlüssel</button>
                        <button type="button" id="btn-tab-meters" onclick="switchAptTab('meters')" class="apt-tab-btn whitespace-nowrap pb-3 border-b-2 font-bold text-sm transition-colors border-transparent text-gray-500 hover:text-gray-700">Zähler</button>
                    </div>
                    
                    <form id="apartment-form" class="flex-grow flex flex-col justify-between">
                        <input type="hidden" id="apt_form_id" value="${apt.id || ''}">
                        
                        <div class="flex-grow">
                            <!-- TAB: STAMMDATEN -->
                            <div id="tab-base" class="apt-tab-content space-y-6">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Nummer / Lage *</label>
                                        <input type="text" id="apt_form_no" value="${apt.apartment_number || ''}" placeholder="z.B. WE 01" required>
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Etage</label>
                                        <input type="text" id="apt_form_floor" value="${apt.floor || ''}" placeholder="z.B. 1. OG Links">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Nutzungsart</label>
                                        <select id="apt_form_type">
                                            <option value="Wohnen" ${apt.type === 'Wohnen' ? 'selected' : ''}>Wohnen</option>
                                            <option value="Gewerbe" ${apt.type === 'Gewerbe' ? 'selected' : ''}>Gewerbe</option>
                                            <option value="Stellplatz" ${apt.type === 'Stellplatz' ? 'selected' : ''}>Stellplatz/Garage</option>
                                        </select>
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Zimmer</label>
                                        <input type="number" id="apt_form_rooms" value="${apt.rooms || ''}" step="0.5" placeholder="z.B. 2.5">
                                    </div>
                                </div>
                            </div>

                            <!-- TAB: FINANZEN -->
                            <div id="tab-finance" class="apt-tab-content hidden space-y-6">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Aktuelle Kaltmiete (€)</label>
                                        <input type="number" id="apt_form_rent" value="${apt.rent_amount || ''}" step="0.01">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Nebenkosten-Vorauszahlung (€)</label>
                                        <input type="number" id="apt_form_utils" value="${apt.utilities_amount || ''}" step="0.01">
                                    </div>
                                    <div class="space-y-1 md:col-span-2 border-t border-gray-100 pt-4 mt-2">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Hausgeld / Vorauszahlung WEG (€)</label>
                                        <input type="number" id="apt_form_hausgeld" value="${apt.hausgeld || ''}" step="0.01" placeholder="Relevant für Eigentümer/WEG">
                                    </div>
                                </div>
                            </div>

                            <!-- TAB: UMLAGESCHLÜSSEL -->
                            <div id="tab-apportionment" class="apt-tab-content hidden space-y-6">
                                <div class="bg-blue-50/50 border border-blue-100 p-4 rounded-xl mb-4 text-sm text-blue-800">
                                    Diese Werte dienen als Basis (Verteilerschlüssel) für die jährliche Nebenkosten- und Hausgeldabrechnung.
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Wohn-/Nutzfläche (m²)</label>
                                        <input type="number" id="apt_form_sqm" value="${apt.sq_meters || ''}" step="0.01">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">MEA (Miteigentumsanteile)</label>
                                        <input type="number" id="apt_form_mea" value="${apt.mea || ''}" step="0.0001" placeholder="z.B. 125.5">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Einheiten (Verteilerschlüssel)</label>
                                        <input type="number" id="apt_form_dist_units" value="${apt.distribution_units || '1'}" step="0.0001" placeholder="Standard: 1">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Personenanzahl (Aktuell)</label>
                                        <input type="number" id="apt_form_persons" value="${apt.persons_count || '1'}" step="1" min="0">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Festumlage / Direktkosten (€)</label>
                                        <input type="number" id="apt_form_fixed_app" value="${apt.fixed_apportionment || ''}" step="0.01">
                                    </div>
                                </div>
                                <div class="mt-6 p-4 border border-gray-200 rounded-xl bg-gray-50 flex items-center gap-3">
                                    <input type="checkbox" id="apt_form_ext_bill" ${apt.has_external_billing ? 'checked' : ''}>
                                    <label for="apt_form_ext_bill" class="text-sm font-bold text-gray-700 cursor-pointer">Heiz- und Warmwasserkosten werden durch externen Dienstleister (z.B. Techem, Brunata) abgerechnet.</label>
                                </div>
                            </div>

                            <!-- TAB: ZÄHLER -->
                            <div id="tab-meters" class="apt-tab-content hidden space-y-6">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Stromzähler-Nr.</label>
                                        <input type="text" id="apt_form_elec" value="${apt.meter_electricity || ''}">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Wasserzähler-Nr.</label>
                                        <input type="text" id="apt_form_water" value="${apt.meter_water || ''}">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest">Wärmemengenzähler-Nr.</label>
                                        <input type="text" id="apt_form_heat" value="${apt.meter_heating || ''}">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Buttons Container am Ende -->
                        <div class="pt-6 mt-6 border-t border-gray-100 flex gap-4 flex-shrink-0">
                            <button type="submit" class="btn-primary w-full md:w-auto">Einheit speichern</button>
                            ${isEdit ? `<button type="button" onclick="deleteApartment(${apt.id})" class="btn-secondary text-red-500 hover:bg-red-50 hover:text-red-600 bg-white border border-red-100">Einheit löschen</button>` : ''}
                        </div>
                    </form>
                </div>
            `;

            document.getElementById('apartment-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const payload = {
                    building_id: selectedBuildingId,
                    apartment_number: document.getElementById('apt_form_no').value,
                    floor: document.getElementById('apt_form_floor').value,
                    type: document.getElementById('apt_form_type').value,
                    rooms: document.getElementById('apt_form_rooms').value || null,
                    
                    // Finanzen
                    rent_amount: document.getElementById('apt_form_rent').value || 0,
                    utilities_amount: document.getElementById('apt_form_utils').value || 0,
                    hausgeld: document.getElementById('apt_form_hausgeld').value || 0,
                    
                    // Umlagen
                    sq_meters: document.getElementById('apt_form_sqm').value || null,
                    mea: document.getElementById('apt_form_mea').value || null,
                    distribution_units: document.getElementById('apt_form_dist_units').value || 1,
                    persons_count: document.getElementById('apt_form_persons').value || 1,
                    fixed_apportionment: document.getElementById('apt_form_fixed_app').value || 0,
                    has_external_billing: document.getElementById('apt_form_ext_bill').checked,
                    
                    // Zähler
                    meter_electricity: document.getElementById('apt_form_elec').value,
                    meter_water: document.getElementById('apt_form_water').value,
                    meter_heating: document.getElementById('apt_form_heat').value
                };

                const fId = document.getElementById('apt_form_id').value;
                let res;
                if (fId) res = await _supabase.from('apartments').update(payload).eq('id', fId);
                else res = await _supabase.from('apartments').insert([payload]);

                if (res.error) { showToast(res.error.message, "error"); } 
                else { 
                    showToast("Einheit erfolgreich gespeichert!"); 
                    selectBuilding(selectedBuildingId); // Zurück zur Übersicht
                }
            });
        }

        async function deleteApartment(id) {
            if(confirm("Möchten Sie diese Einheit wirklich löschen?")) {
                const {error} = await _supabase.from('apartments').delete().eq('id', id);
                if(error) showToast(error.message, "error");
                else {
                    showToast("Einheit gelöscht");
                    selectBuilding(selectedBuildingId);
                }
            }
        }
        // === END: MODUL OBJEKTE ===

        // === START: MODUL MIETER ===
        async function loadUserManagement() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Personen & Mieter</h2><p class="text-gray-400 italic">Nutzerverwaltung und Rollenzuweisung...</p>`;
        }
        async function loadMyTenants() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Meine Mieter</h2><p class="text-gray-400 italic">Vermieter-Bereich zur Verwaltung eigener Mieter...</p>`;
        }
        // === END: MODUL MIETER ===

        // === START: MODUL FINANZEN ===
        async function loadFinance() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Finanzen</h2><p class="text-gray-400 italic">Platzhalter für zukünftige Buchhaltungsfunktionen...</p>`;
        }
        // === END: MODUL FINANZEN ===

        // === START: MODUL KONTAKTE ===
        async function loadContacts() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Kontaktbuch</h2><p class="text-gray-400 italic">Wird in Kürze implementiert...</p>`;
        }
        // === END: MODUL KONTAKTE ===

        // === START: MODUL PROFIL & EINSTELLUNGEN ===
        async function loadProfile() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Mein Profil</h2><p class="text-gray-400 italic">Hier kannst du deine persönlichen Daten bearbeiten...</p>`;
        }
        async function loadSettings() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Einstellungen</h2><p class="text-gray-400 italic">Globale Einstellungen, Kategorien und Vorlagen...</p>`;
        }
        // === END: MODUL PROFIL & EINSTELLUNGEN ===

        init();
    </script>
</body>
</html>
