<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieterportal | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive':      '#687451',
                        'hb-offblack':   '#373737',
                        'hb-ultralight': '#F9FAF8',
                        'hb-orange':     '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { 'lg': '15px', 'xl': '15px', '2xl': '15px' },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.03)' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F9FAF8; font-size: 16px; color: #373737; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .nav-link { border-radius: 12px; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; color: #687451; }
        .nav-link:hover { background-color: #f3f4f6; color: #687451; }
        .active-link { background-color: #687451 !important; color: white !important; }
        .nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; color: #9ca3af; padding: 24px 16px 8px 16px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid rgba(104, 116, 81, 0.2); overflow: hidden; }
        .dropdown-open { display: block !important; animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        body input, body select, body textarea { border-radius: 15px; background-color: #F9FAF8; border: 1px solid #e5e7eb; transition: all 0.2s; padding: 10px 16px; width: 100%; height: 40px; font-size: 14px; }
        body textarea { height: auto; min-height: 80px; padding: 10px 16px; }
        input:focus, select:focus, textarea:focus { background-color: white; border-color: #687451; outline: none; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); }
        input[type="checkbox"] { width: auto; accent-color: #687451; width: 1.2rem; height: 1.2rem; cursor: pointer; border-radius: 4px; }
        .btn-primary { background-color: #687451; color: white; border-radius: 12px; transition: all 0.2s; font-weight: 600; padding: 12px 24px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); }
        .btn-secondary { background-color: #e5e7eb; color: #374151; border-radius: 12px; transition: all 0.2s; font-weight: 600; padding: 12px 24px; cursor: pointer; }
        .badge-eigentuemer  { background-color: #eef0eb; color: #687451; border-color: #c4ccb8; }
        .badge-mieter       { background-color: #fdf1e8; color: #c4601e; border-color: #f5c9a0; }
        .badge-dienstleister{ background-color: #f3f3f3; color: #555555; border-color: #d4d4d4; }
        .badge-beirat       { background-color: #e8ebe4; color: #4a5337; border-color: #b5bfab; }
        /* Ticket-Status-Badges */
        .ts-offen        { background-color: rgba(235,118,45,.12); color: #c4601e; }
        .ts-bearbeitung  { background-color: rgba(104,116,81,.12); color: #687451; }
        .ts-warte        { background-color: rgba(235,118,45,.18); color: #a34e18; }
        .ts-wiedervorlage{ background-color: rgba(104,116,81,.18); color: #4a5337; }
        .ts-erledigt     { background-color: #f3f4f6; color: #9ca3af; }
        /* News-Kategorie-Badges */
        .nc-ankuendigung { background-color: rgba(104,116,81,.12); color: #687451; }
        .nc-wartung      { background-color: rgba(235,118,45,.12); color: #c4601e; }
        .nc-allgemein    { background-color: #f3f4f6; color: #6b7280; }
        .nav-link { display: flex; align-items: center; gap: 0.5rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col md:flex-row text-left relative overflow-hidden" onclick="closeDropdowns(event)">

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none text-left"></div>

    <!-- Mobile Header -->
    <div class="md:hidden bg-white border-b border-gray-100 p-4 flex justify-between items-center sticky top-0 z-50">
        <div onclick="loadDashboard(); document.querySelectorAll('#nav-links a').forEach(a=>a.classList.remove('active-link')); document.querySelector('#nav-links a')?.classList.add('active-link');"
            class="font-bold text-xl tracking-tight text-hb-olive flex items-center gap-2 cursor-pointer">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-8 w-auto">
            Mieterportal
        </div>
        <button onclick="toggleMenu()" class="text-hb-olive p-2 bg-gray-50 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
        </button>
    </div>

    <!-- Sidebar -->
    <nav id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 z-40 w-72 bg-white border-r border-gray-100 flex-shrink-0 h-screen flex flex-col shadow-soft text-left">
        <div onclick="loadDashboard(); document.querySelectorAll('#nav-links a').forEach(a=>a.classList.remove('active-link')); document.querySelector('#nav-links a')?.classList.add('active-link');"
            class="p-8 pb-4 hidden md:block text-center border-b border-gray-50 mb-4 cursor-pointer hover:bg-gray-50/50 transition-colors">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-10 w-auto mx-auto mb-2">
            <div class="font-extrabold text-xl tracking-tighter text-hb-olive">Mieterportal</div>
            <p class="text-[10px] uppercase tracking-widest font-bold text-gray-400">HB Verwaltung</p>
        </div>
        <div class="flex-grow p-4 overflow-y-auto chat-scroll">
            <ul class="space-y-1" id="nav-links"></ul>
        </div>
    </nav>
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-hb-offblack/20 backdrop-blur-sm z-30 hidden text-left"></div>

    <!-- Main -->
    <main class="flex-grow h-screen overflow-y-auto relative flex flex-col text-left">
        <header class="p-4 md:p-6 flex justify-between items-center sticky top-0 bg-hb-ultralight/80 backdrop-blur-md z-30 text-left">
            <div class="text-left">
                <p id="role-label" class="text-xs uppercase tracking-widest font-bold text-hb-orange mb-1"></p>
                <h1 id="welcome-title" class="text-2xl md:text-3xl font-extrabold tracking-tight">Lade...</h1>
            </div>
            <div class="relative dropdown-container text-left">
                <button onclick="toggleUserDropdown(event)" class="flex items-center gap-3 bg-white p-1.5 pr-3 rounded-full border border-gray-200 shadow-sm hover:border-hb-olive transition-colors">
                    <div id="user-avatar" class="w-9 h-9 bg-hb-olive text-white rounded-full flex items-center justify-center font-bold text-sm uppercase">?</div>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-gray-100 z-50 overflow-hidden text-left">
                    <div class="p-4 border-b border-gray-50 text-left">
                        <p class="text-sm font-bold truncate text-left" id="dropdown-name">Name</p>
                        <p class="text-xs text-gray-400 truncate text-left" id="dropdown-email">email</p>
                    </div>
                    <button onclick="loadProfile();" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 flex items-center gap-3 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        Profil bearbeiten
                    </button>
                    <button onclick="logout()" class="w-full text-left px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 flex items-center gap-3 border-t border-gray-50 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        Abmelden
                    </button>
                </div>
            </div>
        </header>
        <div id="content-area" class="flex-grow px-6 md:px-10 pb-20 overflow-y-auto text-left"></div>
    </main>

    <!-- =====================================================
         JS Module laden (Reihenfolge beachten!)
         1. Supabase-Client & globale Vars (config.js)
         2. UI-Hilfsfunktionen (utils.js)
         3. Feature-Module (js/modules/*.js)
         4. Navigation & Init — muss zuletzt kommen (nav.js)
    ===================================================== -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/modules/mod-dashboard.js"></script>
    <script src="js/modules/mod-objekte.js"></script>
    <script src="js/modules/mod-personen.js"></script>
    <script src="js/modules/mod-persons-edit.js"></script>
    <script src="js/modules/mod-news.js"></script>
    <script src="js/modules/mod-tickets.js"></script>
    <script src="js/modules/mod-kontakte.js"></script>
    <script src="js/modules/mod-placeholder.js"></script>
    <script src="js/nav.js"></script>

</body>
</html>
