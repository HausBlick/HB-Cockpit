<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieterportal | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F9FAF8',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { 'lg': '15px', 'xl': '15px', '2xl': '15px' },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.03)' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F9FAF8; font-size: 16px; color: #373737; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .nav-link { border-radius: 12px; transition: all 0.2s; cursor: pointer; }
        .nav-link:hover { background-color: #f3f4f6; color: #687451; }
        .active-link { background-color: #687451 !important; color: white !important; font-weight: 600; }
        
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0,0,0,0.02); }
        .btn-primary { background-color: #687451; color: white; border-radius: 12px; transition: all 0.2s; font-weight: 600; padding: 12px 24px; cursor: pointer; }
        
        .dropdown-open { display: block !important; animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col md:flex-row text-left relative overflow-hidden" onclick="closeDropdowns(event)">

    <!-- === START: UI BASIS ELEMENTE === -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- Mobile Header -->
    <div class="md:hidden bg-white border-b border-gray-100 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-bold text-xl tracking-tight text-hb-olive flex items-center gap-2">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-8 w-auto">
            Mieterportal
        </div>
        <button onclick="toggleMenu()" class="text-hb-olive p-2 bg-gray-50 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
        </button>
    </div>
    <!-- === END: UI BASIS ELEMENTE === -->

    <!-- === START: MODUL SIDEBAR === -->
    <nav id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 z-40 w-72 bg-white border-r border-gray-100 flex-shrink-0 h-screen flex flex-col shadow-soft">
        <div class="p-8 pb-4 hidden md:block text-center border-b border-gray-50 mb-4">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-10 w-auto mx-auto mb-2">
            <div class="font-extrabold text-xl tracking-tighter text-hb-olive">Mieterportal</div>
            <p class="text-[10px] uppercase tracking-widest font-bold text-gray-400">HB Verwaltung</p>
        </div>
        <div class="flex-grow p-4 overflow-y-auto">
            <ul class="space-y-1" id="nav-links">
                <!-- Navigations-Links werden per JavaScript eingefügt -->
            </ul>
        </div>
    </nav>
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-hb-offblack/20 backdrop-blur-sm z-30 hidden text-left"></div>
    <!-- === END: MODUL SIDEBAR === -->

    <!-- === START: MAIN VIEWPORT === -->
    <main class="flex-grow h-screen overflow-y-auto relative flex flex-col">
        <!-- Header -->
        <header class="p-6 md:p-10 flex justify-between items-center sticky top-0 bg-hb-ultralight/80 backdrop-blur-md z-30">
            <div class="text-left">
                <p id="role-label" class="text-[10px] uppercase tracking-widest font-bold text-hb-orange mb-1"></p>
                <h1 id="welcome-title" class="text-2xl md:text-3xl font-extrabold tracking-tight">Lade...</h1>
            </div>
            
            <!-- User Menu -->
            <div class="relative dropdown-container">
                <button onclick="toggleUserDropdown(event)" class="flex items-center gap-3 bg-white p-1.5 pr-3 rounded-full border border-gray-200 shadow-sm hover:border-hb-olive transition-colors">
                    <div id="user-avatar" class="w-9 h-9 bg-hb-olive text-white rounded-full flex items-center justify-center font-bold text-sm uppercase">?</div>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-gray-100 z-50 overflow-hidden">
                    <div class="p-4 border-b border-gray-50">
                        <p class="text-sm font-bold truncate" id="dropdown-name">Name</p>
                        <p class="text-xs text-gray-400 truncate" id="dropdown-email">email</p>
                    </div>
                    <button onclick="loadProfile();" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 flex items-center gap-3">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Profil bearbeiten
                    </button>
                    <button onclick="logout()" class="w-full text-left px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 flex items-center gap-3 border-t border-gray-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Abmelden
                    </button>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="content-area" class="flex-grow px-6 md:px-10 pb-20 overflow-y-auto text-left">
            <!-- Inhalte werden hier geladen -->
        </div>
    </main>
    <!-- === END: MAIN VIEWPORT === -->

    <script>
        // === START: SETUP & GLOBALE VARIABLEN ===
        const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
        const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let userProfile = null;

        const icons = {
            dashboard: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>`,
            news: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"></path></svg>`,
            tickets: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>`,
            users: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path></svg>`,
            buildings: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 21h18"></path><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path></svg>`,
            docs: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>`,
            contact: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>`
        };

        function toggleUserDropdown(e) { e.stopPropagation(); document.getElementById('user-dropdown').classList.toggle('hidden'); }
        function closeDropdowns(e) { if(!e.target.closest('.dropdown-container')) document.getElementById('user-dropdown').classList.add('hidden'); }
        function logout() { _supabase.auth.signOut().then(() => window.location.href = 'index.html'); }
        // === END: SETUP & GLOBALE VARIABLEN ===

        // === START: INIT & NAVIGATION ===
        async function init() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) { window.location.href = 'index.html'; return; }
                currentUser = user;

                const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                if (!profile) return;
                userProfile = profile;

                document.getElementById('welcome-title').textContent = "Hallo, " + profile.full_name.split(' ')[0] + "!";
                document.getElementById('role-label').textContent = profile.role === 'admin' ? 'Vermieter Cockpit' : 'Mieter Portal';
                document.getElementById('user-avatar').textContent = profile.full_name.charAt(0).toUpperCase();
                document.getElementById('dropdown-name').textContent = profile.full_name;
                document.getElementById('dropdown-email').textContent = profile.email;

                renderNav(profile.role);
                loadDashboard(); 
            } catch (err) { console.error(err); }
        }

        function renderNav(role) {
            const nav = document.getElementById('nav-links');
            const itemClass = "nav-link flex items-center gap-4 p-3.5 text-sm font-semibold text-hb-offblack";
            const sectionClass = "pt-6 pb-2 px-4 text-[10px] uppercase tracking-widest font-extrabold text-gray-400 text-left";
            
            if (role === 'admin') {
                nav.innerHTML = `
                    <li><a onclick="loadDashboard(); setActiveNav('nav-dash')" id="nav-dash" class="${itemClass} active-link">${icons.dashboard} Dashboard</a></li>
                    <li class="${sectionClass}">Kommunikation</li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Mieter-Tickets</a></li>
                    <li class="${sectionClass}">Verwaltung</li>
                    <li><a onclick="loadUserManagement(); setActiveNav('nav-users')" id="nav-users" class="${itemClass}">${icons.users} Mieter</a></li>
                    <li><a onclick="loadTenants(); setActiveNav('nav-apartments')" id="nav-apartments" class="${itemClass}">${icons.buildings} Objekte</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Dokumente</a></li>
                    <li><a onclick="loadContacts(); setActiveNav('nav-contact')" id="nav-contact" class="${itemClass}">${icons.contact} Kontaktbuch</a></li>
                `;
            } else {
                nav.innerHTML = `
                    <li><a onclick="loadDashboard(); setActiveNav('nav-dash')" id="nav-dash" class="${itemClass} active-link">${icons.dashboard} Dashboard</a></li>
                    <li><a onclick="loadNews(); setActiveNav('nav-news')" id="nav-news" class="${itemClass}">${icons.news} Schwarzes Brett</a></li>
                    <li><a onclick="loadTickets(); setActiveNav('nav-tickets')" id="nav-tickets" class="${itemClass}">${icons.tickets} Meine Tickets</a></li>
                    <li><a onclick="loadDocuments(); setActiveNav('nav-docs')" id="nav-docs" class="${itemClass}">${icons.docs} Meine Dokumente</a></li>
                    <li><a onclick="loadContacts(); setActiveNav('nav-contact')" id="nav-contact" class="${itemClass}">${icons.contact} Kontaktbuch</a></li>
                `;
            }
        }

        function setActiveNav(id) {
            document.querySelectorAll('#nav-links a').forEach(el => el.classList.remove('active-link'));
            const activeEl = document.getElementById(id);
            if (activeEl) activeEl.classList.add('active-link');
            if(window.innerWidth < 768) toggleMenu();
        }
        // === END: INIT & NAVIGATION ===

        // === START: MODUL DASHBOARD ===
        async function loadDashboard() {
            const container = document.getElementById('content-area');
            container.innerHTML = `
                <div class="p-10 card text-center">
                    <h2 class="text-xl font-bold mb-2">Willkommen im Dashboard</h2>
                    <p class="text-gray-500">Wähle einen Menüpunkt aus der Sidebar, um zu starten.</p>
                </div>
            `;
        }
        // === END: MODUL DASHBOARD ===

        // === START: MODUL TICKETS ===
        async function loadTickets() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Tickets</h2><p class="text-gray-400 italic">Modul wird neu aufgebaut...</p>`;
        }
        // === END: MODUL TICKETS ===

        // === START: MODUL NEWS ===
        async function loadNews() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Schwarzes Brett</h2><p class="text-gray-400 italic">Modul wird neu aufgebaut...</p>`;
        }
        // === END: MODUL NEWS ===

        // === START: MODUL DOKUMENTE ===
        async function loadDocuments() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Dokumente</h2><p class="text-gray-400 italic">Modul wird neu aufgebaut...</p>`;
        }
        // === END: MODUL DOKUMENTE ===

        // === START: MODUL OBJEKTE ===
        async function loadTenants() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Objekte & Einheiten</h2><p class="text-gray-400 italic">Modul wird neu aufgebaut...</p>`;
        }
        // === END: MODUL OBJEKTE ===

        // === START: MODUL MIETER ===
        async function loadUserManagement() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Mieterverwaltung</h2><p class="text-gray-400 italic">Modul wird neu aufgebaut...</p>`;
        }
        // === END: MODUL MIETER ===

        // === START: MODUL KONTAKTE ===
        async function loadContacts() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Kontaktbuch</h2><p class="text-gray-400 italic">Modul wird neu aufgebaut...</p>`;
        }
        // === END: MODUL KONTAKTE ===

        // === START: MODUL PROFIL ===
        async function loadProfile() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<h2 class="text-2xl font-extrabold mb-6">Mein Profil</h2><p class="text-gray-400 italic">Modul wird neu aufgebaut...</p>`;
        }
        // === END: MODUL PROFIL ===

        init();
    </script>
</body>
</html>
