<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieterportal | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive': '#687451',
                        'hb-offblack': '#373737',
                        'hb-ultralight': '#F9FAF8',
                        'hb-orange': '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { 'lg': '15px', 'xl': '15px', '2xl': '15px' },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.03)' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F9FAF8; font-size: 16px; color: #373737; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .nav-link { border-radius: 12px; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; color: #373737; }
        .nav-link:hover { background-color: #f3f4f6; color: #687451; }
        .active-link { background-color: #687451 !important; color: white !important; }
        .nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; color: #9ca3af; padding: 24px 16px 8px 16px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0,0,0,0.02); }
        .dropdown-open { display: block !important; animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Formular Styling */
        input, select, textarea { border-radius: 12px; background-color: #F9FAF8; border: 1px solid #e5e7eb; transition: all 0.2s; padding: 12px 16px; width: 100%; font-size: 14px; }
        input:focus, select:focus, textarea:focus { background-color: white; border-color: #687451; outline: none; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); }
        input[type="checkbox"] { width: auto; accent-color: #687451; width: 1.2rem; height: 1.2rem; cursor: pointer; border-radius: 4px; }
        
        .btn-primary { background-color: #687451; color: white; border-radius: 12px; transition: all 0.2s; font-weight: 600; padding: 12px 24px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); }
        .btn-secondary { background-color: #e5e7eb; color: #374151; border-radius: 12px; transition: all 0.2s; font-weight: 600; padding: 12px 24px; cursor: pointer; }

        /* Rollen Badges */
        .badge-eigentuemer { background-color: #e0e7ff; color: #1e40af; border-color: #c7d2fe; }
        .badge-mieter { background-color: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .badge-dienstleister { background-color: #fef3c7; color: #92400e; border-color: #fde68a; }
        .badge-beirat { background-color: #f3e8ff; color: #7e22ce; border-color: #e9d5ff; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col md:flex-row text-left relative overflow-hidden" onclick="closeDropdowns(event)">

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none text-left"></div>

    <!-- Mobile Header -->
    <div class="md:hidden bg-white border-b border-gray-100 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-bold text-xl tracking-tight text-hb-olive flex items-center gap-2">Mieterportal</div>
        <button onclick="toggleMenu()" class="text-hb-olive p-2 bg-gray-50 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
        </button>
    </div>

    <!-- Sidebar -->
    <nav id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 z-40 w-72 bg-white border-r border-gray-100 flex-shrink-0 h-screen flex flex-col shadow-soft text-left">
        <div class="p-8 pb-4 hidden md:block text-center border-b border-gray-50 mb-4">
            <div class="font-extrabold text-xl tracking-tighter text-hb-olive">Mieterportal</div>
            <p class="text-[10px] uppercase tracking-widest font-bold text-gray-400">HB Verwaltung</p>
        </div>
        <div class="flex-grow p-4 overflow-y-auto chat-scroll">
            <ul class="space-y-1" id="nav-links"></ul>
        </div>
    </nav>
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-hb-offblack/20 backdrop-blur-sm z-30 hidden text-left"></div>

    <!-- Main -->
    <main class="flex-grow h-screen overflow-y-auto relative flex flex-col text-left">
        <header class="p-6 md:p-10 flex justify-between items-center sticky top-0 bg-hb-ultralight/80 backdrop-blur-md z-30 text-left">
            <div class="text-left">
                <p id="role-label" class="text-[10px] uppercase tracking-widest font-bold text-hb-orange mb-1"></p>
                <h1 id="welcome-title" class="text-2xl md:text-3xl font-extrabold tracking-tight">Lade...</h1>
            </div>
            
            <div class="relative dropdown-container text-left">
                <button onclick="toggleUserDropdown(event)" class="flex items-center gap-3 bg-white p-1.5 pr-3 rounded-full border border-gray-200 shadow-sm hover:border-hb-olive transition-colors">
                    <div id="user-avatar" class="w-9 h-9 bg-hb-olive text-white rounded-full flex items-center justify-center font-bold text-sm uppercase">?</div>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-gray-100 z-50 overflow-hidden text-left">
                    <div class="p-4 border-b border-gray-50 text-left">
                        <p class="text-sm font-bold truncate text-left" id="dropdown-name">Name</p>
                        <p class="text-xs text-gray-400 truncate text-left" id="dropdown-email">email</p>
                    </div>
                    <button onclick="loadProfile();" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 flex items-center gap-3 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Profil bearbeiten
                    </button>
                    <button onclick="logout()" class="w-full text-left px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 flex items-center gap-3 border-t border-gray-50 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Abmelden
                    </button>
                </div>
            </div>
        </header>

        <div id="content-area" class="flex-grow px-6 md:px-10 pb-20 overflow-y-auto text-left"></div>
    </main>

    <script>
        // === SETUP & GLOBALE VARIABLEN ===
        const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
        const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let userProfile = null;
        let currentBuildings = [];
        let selectedBuildingId = null;
        let currentApartments = [];

        const icons = {
            dashboard: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>`,
            news: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"></path></svg>`,
            tickets: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>`,
            users: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>`,
            buildings: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 21h18"></path><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path></svg>`,
            docs: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg>`,
            contact: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path></svg>`,
            finance: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`,
            settings: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>`
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-hb-orange' : 'bg-hb-olive';
            toast.className = `${bgColor} text-white px-6 py-4 rounded-xl shadow-xl flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0 z-50`;
            toast.innerHTML = `<span class="text-sm font-bold text-left">${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function toggleUserDropdown(e) { e.stopPropagation(); document.getElementById('user-dropdown').classList.toggle('hidden'); }
        function closeDropdowns(e) { if(!e.target.closest('.dropdown-container')) document.getElementById('user-dropdown').classList.add('hidden'); }
        function logout() { _supabase.auth.signOut().then(() => window.location.href = 'index.html'); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('overlay').classList.toggle('hidden'); }
        
        // === START: MODUL OBJEKTE ===
        async function loadTenants() {
            const container = document.getElementById('content-area');
            container.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-6 h-[calc(100vh-140px)] text-left">
                    <div class="w-full lg:w-1/3 flex flex-col gap-4 h-full">
                        <div class="card flex flex-col h-full overflow-hidden border border-gray-100">
                            <div class="p-5 border-b border-gray-50 flex justify-between items-center bg-gray-50/50">
                                <h2 class="text-sm font-black uppercase tracking-widest text-gray-500">Immobilienbestand</h2>
                                <button onclick="showBuildingForm()" class="bg-hb-olive text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-opacity-80 shadow-sm transition-transform hover:scale-105">+</button>
                            </div>
                            <div id="buildings-list" class="flex-grow overflow-y-auto p-3 space-y-2 chat-scroll"></div>
                        </div>
                    </div>
                    <div class="w-full lg:w-2/3 flex flex-col h-full text-left" id="units-area">
                        <div class="card p-10 flex flex-col items-center justify-center text-gray-400 h-full">Bitte wähle ein Objekt aus.</div>
                    </div>
                </div>`;
            await fetchBuildingsList();
        }

        async function fetchBuildingsList() {
            const list = document.getElementById('buildings-list');
            const { data } = await _supabase.from('buildings').select('*').order('name');
            currentBuildings = data || [];
            list.innerHTML = currentBuildings.map(b => {
                const addressStr = b.street ? `${b.street} ${b.house_number || ''}, ${b.zip_code || ''} ${b.city || ''}` : (b.address || 'Keine Adresse');
                return `<div onclick="selectBuilding(${b.id})" id="b-item-${b.id}" class="p-4 rounded-xl cursor-pointer border border-transparent hover:bg-gray-50 transition-all text-left">
                <h3 class="font-bold text-hb-offblack">${b.name}</h3><p class="text-xs text-gray-500 truncate">${addressStr}</p></div>`;
            }).join('');
            if(selectedBuildingId) highlightSelectedBuilding(selectedBuildingId);
        }

        function highlightSelectedBuilding(id) {
            document.querySelectorAll('[id^="b-item-"]').forEach(el => el.classList.remove('bg-hb-olive', 'text-white'));
            const sel = document.getElementById(`b-item-${id}`);
            if (sel) sel.classList.add('bg-hb-olive', 'text-white');
        }

        async function selectBuilding(id) {
            selectedBuildingId = id;
            highlightSelectedBuilding(id);
            const b = currentBuildings.find(x => x.id === id);
            const addressStr = b.street ? `${b.street} ${b.house_number || ''}, ${b.zip_code || ''} ${b.city || ''}` : (b.address || 'Keine Adresse');
            
            document.getElementById('units-area').innerHTML = `
                <div class="card h-full flex flex-col overflow-hidden text-left">
                    <div class="p-6 border-b border-gray-50 bg-white flex justify-between items-start text-left">
                        <div class="text-left">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-gray-100 text-gray-600 text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-md">${b.status || 'Aktiv'}</span>
                                <span class="text-xs font-bold text-gray-400">Akten-Nr: ${b.file_number || '-'}</span>
                            </div>
                            <h2 class="text-2xl font-extrabold text-hb-offblack">${b.name}</h2>
                            <p class="text-sm text-gray-500">${addressStr}</p>
                        </div>
                        <button onclick="showBuildingForm(${b.id})" class="text-xs font-bold text-hb-olive bg-hb-ultralight px-4 py-2 rounded-xl hover:bg-gray-100 transition-colors shadow-sm">Details</button>
                    </div>
                    <div class="px-6 py-4 bg-gray-50/50 border-b border-gray-50 flex justify-between items-center text-left">
                        <h3 class="text-sm font-black uppercase tracking-widest text-gray-500">Zugehörige Einheiten</h3>
                        <button onclick="showApartmentForm()" class="btn-primary py-2 px-4 text-xs shadow-sm">+ Einheit</button>
                    </div>
                    <div class="flex-grow overflow-y-auto p-6 bg-[#f4f5f1] chat-scroll text-left" id="apartments-list"></div>
                </div>`;
            await fetchApartmentsForBuilding(id);
        }

        window.switchBuildingTab = function(tabId) {
            document.querySelectorAll('.bldg-tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.bldg-tab-btn').forEach(el => {
                el.classList.remove('border-hb-olive', 'text-hb-olive');
                el.classList.add('border-transparent', 'text-gray-500');
            });
            document.getElementById('bldg-tab-' + tabId).classList.remove('hidden');
            const btn = document.getElementById('bldg-btn-tab-' + tabId);
            if(btn) { btn.classList.remove('border-transparent', 'text-gray-500'); btn.classList.add('border-hb-olive', 'text-hb-olive'); }
        };

        async function showBuildingForm(id = null) {
            const area = document.getElementById('units-area');
            let b = id ? currentBuildings.find(x => x.id === id) : {};
            const isEdit = !!id;
            
            area.innerHTML = `
                <div class="card p-8 h-full overflow-y-auto border border-gray-100 shadow-sm flex flex-col text-left">
                    <div class="flex justify-between items-center mb-6 text-left">
                        <h2 class="text-2xl font-extrabold text-hb-offblack tracking-tight">${isEdit ? 'Gebäude bearbeiten' : 'Neues Gebäude'}</h2>
                        <button onclick="selectedBuildingId ? selectBuilding(selectedBuildingId) : loadTenants()" class="text-xs font-bold text-gray-400 uppercase tracking-widest hover:text-hb-orange">Zurück</button>
                    </div>

                    <div class="flex overflow-x-auto border-b border-gray-200 mb-6 gap-8 hide-scrollbar flex-shrink-0">
                        <button type="button" id="bldg-btn-tab-base" onclick="switchBuildingTab('base')" class="bldg-tab-btn whitespace-nowrap pb-3 border-b-2 font-bold text-sm transition-colors border-hb-olive text-hb-olive">Stammdaten</button>
                        <button type="button" id="bldg-btn-tab-legal" onclick="switchBuildingTab('legal')" class="bldg-tab-btn whitespace-nowrap pb-3 border-b-2 font-bold text-sm transition-colors border-transparent text-gray-500 hover:text-gray-700">Grundbuch</button>
                        <button type="button" id="bldg-btn-tab-tech" onclick="switchBuildingTab('tech')" class="bldg-tab-btn whitespace-nowrap pb-3 border-b-2 font-bold text-sm transition-colors border-transparent text-gray-500 hover:text-gray-700">Technik</button>
                    </div>

                    <form id="building-form" class="flex-grow flex flex-col justify-between text-left space-y-6">
                        <div id="bldg-tab-base" class="bldg-tab-content grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Name *</label><input type="text" id="b_name" value="${b.name || ''}" required></div>
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Akten-Nr.</label><input type="text" id="b_file" value="${b.file_number || ''}"></div>
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Straße</label><input type="text" id="b_street" value="${b.street || ''}"></div>
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Haus-Nr.</label><input type="text" id="b_nr" value="${b.house_number || ''}"></div>
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">PLZ</label><input type="text" id="b_zip" value="${b.zip_code || ''}"></div>
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Ort</label><input type="text" id="b_city" value="${b.city || ''}"></div>
                        </div>
                        <div id="bldg-tab-legal" class="bldg-tab-content hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Grundbuchamt</label><input type="text" id="b_registry" value="${b.land_registry || ''}"></div>
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Gesamt-MEA</label><input type="number" id="b_total_mea" value="${b.total_mea || ''}" step="0.0001"></div>
                        </div>
                        <div id="bldg-tab-tech" class="bldg-tab-content hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Baujahr</label><input type="number" id="b_year" value="${b.construction_year || ''}"></div>
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Heizung</label><input type="text" id="b_heat" value="${b.energy_source || ''}"></div>
                        </div>
                        <div class="pt-6 border-t flex gap-4">
                            <button type="submit" class="btn-primary">Speichern</button>
                        </div>
                    </form>
                </div>`;
            
            document.getElementById('building-form').onsubmit = async (e) => {
                e.preventDefault();
                const payload = { 
                    name: document.getElementById('b_name').value,
                    file_number: document.getElementById('b_file').value,
                    street: document.getElementById('b_street').value,
                    house_number: document.getElementById('b_nr').value,
                    zip_code: document.getElementById('b_zip').value,
                    city: document.getElementById('b_city').value,
                    total_mea: document.getElementById('b_total_mea').value || 0,
                    construction_year: document.getElementById('b_year').value || null,
                    energy_source: document.getElementById('b_heat').value
                };
                let res = isEdit ? await _supabase.from('buildings').update(payload).eq('id', id) : await _supabase.from('buildings').insert([payload]);
                if (!res.error) { showToast("Gespeichert"); loadTenants(); }
            };
        }
        // === END: MODUL OBJEKTE ===

        // === START: MODUL PERSONEN ===
        let mockPersons = [
            { id: '1', first_name: 'Max', last_name: 'Müller', email: 'max@mueller.de', phone: '0151-1234567', city: 'Friedrichshafen', is_registered: true, roles: ['Eigentümer', 'Beirat'], contact_type: 'Privatperson' },
            { id: '2', first_name: 'Sabine', last_name: 'Schmidt', email: 'sabine.s@gmx.de', phone: '07541-98765', city: 'Ravensburg', is_registered: false, roles: ['Mieter'], contact_type: 'Privatperson' },
            { id: '3', first_name: '', last_name: 'Sanitär Huber GmbH', email: 'info@huber-sanitaer.de', phone: '07541-112233', city: 'Friedrichshafen', is_registered: false, roles: ['Dienstleister'], contact_type: 'Firma' }
        ];

        let currentPersonFilter = 'Alle';
        let personSearchQuery = '';

        async function loadUserManagement() {
            const container = document.getElementById('content-area');
            container.innerHTML = `
                <div class="flex justify-between items-end mb-6 text-left">
                    <div>
                        <h2 class="text-2xl font-extrabold text-hb-offblack tracking-tight">Globales Adressbuch</h2>
                        <p class="text-sm text-gray-500 mt-1">Verwalten Sie Eigentümer, Mieter und Dienstleister zentral.</p>
                    </div>
                    <button onclick="showPersonForm()" class="btn-primary flex items-center gap-2 text-sm shadow-sm">+ Person</button>
                </div>
                <div class="card flex flex-col overflow-hidden text-left">
                    <div class="p-5 border-b border-gray-100 bg-white flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex flex-wrap gap-2">
                            <button onclick="setPersonFilter('Alle')" class="filter-chip px-4 py-2 text-xs font-bold rounded-full border bg-hb-offblack text-white">Alle</button>
                            <button onclick="setPersonFilter('Eigentümer')" class="filter-chip px-4 py-2 text-xs font-bold rounded-full border bg-white text-gray-500">Eigentümer</button>
                            <button onclick="setPersonFilter('Mieter')" class="filter-chip px-4 py-2 text-xs font-bold rounded-full border bg-white text-gray-500">Mieter</button>
                        </div>
                        <input type="text" onkeyup="handlePersonSearch(event)" placeholder="Suchen..." class="md:w-64">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead><tr class="bg-gray-50 text-[10px] uppercase font-bold text-gray-400 border-b border-gray-100"><th class="p-4">Name</th><th class="p-4">Kontakt</th><th class="p-4">Rollen</th><th class="p-4 text-right">Aktion</th></tr></thead>
                            <tbody id="persons-table-body" class="text-sm divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                </div>`;
            renderPersonsTable();
        }

        window.setPersonFilter = (filter) => { currentPersonFilter = filter; renderPersonsTable(); };
        window.handlePersonSearch = (e) => { personSearchQuery = e.target.value.toLowerCase(); renderPersonsTable(); };

        function renderPersonsTable() {
            const tbody = document.getElementById('persons-table-body');
            let filtered = mockPersons.filter(p => {
                const matchesFilter = currentPersonFilter === 'Alle' || p.roles.includes(currentPersonFilter);
                const matchesSearch = (p.first_name + ' ' + p.last_name).toLowerCase().includes(personSearchQuery);
                return matchesFilter && matchesSearch;
            });
            tbody.innerHTML = filtered.map(p => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4 font-bold">${p.first_name} ${p.last_name}</td>
                    <td class="p-4 text-gray-500">${p.email}</td>
                    <td class="p-4">${p.roles.map(r => `<span class="border text-[9px] font-black uppercase px-2 py-0.5 rounded-md inline-block mr-1">${r}</span>`).join('')}</td>
                    <td class="p-4 text-right"><button onclick="showPersonForm('${p.id}')" class="text-hb-olive font-bold">Bearbeiten</button></td>
                </tr>`).join('');
        }

        window.switchPersonTab = (tabId) => {
            document.querySelectorAll('.person-tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('person-tab-' + tabId).classList.remove('hidden');
        };

        function showPersonForm(id = null) {
            const container = document.getElementById('content-area');
            let p = id ? mockPersons.find(x => x.id === id) : { roles: [] };
            container.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-extrabold">${id ? 'Bearbeiten' : 'Neu'}</h2>
                    <button onclick="loadUserManagement()" class="text-xs font-bold text-gray-400">Zurück</button>
                </div>
                <div class="card p-8 text-left">
                    <div class="flex border-b mb-6 gap-6">
                        <button onclick="switchPersonTab('base')" class="pb-3 border-b-2 border-hb-olive font-bold text-sm">Stammdaten</button>
                        <button onclick="switchPersonTab('finance')" class="pb-3 border-b-2 border-transparent text-gray-500 font-bold text-sm">Finanzen & SEPA</button>
                    </div>
                    <form id="person-form" class="space-y-6">
                        <div id="person-tab-base" class="person-tab-content grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Vorname</label><input type="text" id="p_first" value="${p.first_name || ''}"></div>
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Nachname *</label><input type="text" id="p_last" value="${p.last_name || ''}" required></div>
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">E-Mail</label><input type="email" id="p_email" value="${p.email || ''}"></div>
                        </div>
                        <div id="person-tab-finance" class="person-tab-content hidden grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">IBAN</label><input type="text" placeholder="DE..."></div>
                            <div class="space-y-2"><label class="text-[10px] uppercase font-bold text-gray-500">Mandats-Referenz</label><input type="text"></div>
                        </div>
                        <div class="pt-6 border-t"><button type="submit" class="btn-primary">Kontakt speichern</button></div>
                    </form>
                </div>`;
        }
        // === END: MODUL PERSONEN ===

        // === START: INIT ===
        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            currentUser = user;
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            if (!profile) return;
            userProfile = profile;
            document.getElementById('welcome-title').textContent = "Hallo, " + profile.full_name.split(' ')[0] + "!";
            document.getElementById('role-label').textContent = profile.role === 'admin' ? 'Verwalter Cockpit' : 'Nutzer Portal';
            renderNav(profile.role);
            loadDashboard(); 
        }

        function renderNav(role) {
            const nav = document.getElementById('nav-links');
            let html = `<li><a onclick="loadDashboard(); setActiveNav(this)" class="nav-link active-link">${icons.dashboard} Dashboard</a></li>`;
            if (role === 'admin' || role === 'manager') {
                html += `<li class="nav-section-title">Verwaltung</li><li><a onclick="loadUserManagement(); setActiveNav(this)" class="nav-link">${icons.users} Personen</a></li><li><a onclick="loadTenants(); setActiveNav(this)" class="nav-link">${icons.buildings} Objekte</a></li>`;
            }
            nav.innerHTML = html;
        }

        function setActiveNav(el) {
            document.querySelectorAll('#nav-links a').forEach(a => a.classList.remove('active-link'));
            el.classList.add('active-link');
        }

        init();
    </script>
</body>
</html>
