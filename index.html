<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieterportal | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive':      '#687451',
                        'hb-offblack':   '#373737',
                        'hb-white':      '#FFFFFF',
                        'hb-orange':     '#EB762D',
                        'hb-gold-bold':  '#C5A059',
                        'hb-gold-soft':  '#EEC981',
                        'hb-gray':       '#B4B4B4',
                        'hb-ultralight': '#F5F5F5',
                        'hb-success':    '#4A7C59',
                        'hb-error':      '#C4453E'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { 'lg': '8px', 'xl': '12px', '2xl': '16px' },
                    boxShadow: {
                        'soft': '0 2px 8px rgba(0,0,0,0.08)',
                        'md':   '0 4px 16px rgba(0,0,0,0.10)',
                        'lg':   '0 8px 32px rgba(0,0,0,0.14)'
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F5F5F5; }
        input { border-radius: 12px; background-color: #F5F5F5; border: 1px solid #e5e7eb; transition: all 0.2s; height: 44px; font-size: 15px; }
        input:focus { background-color: white; border-color: #687451; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); outline: none; }
        .btn-primary { background-color: #687451; color: white; border-radius: 12px; transition: all 0.2s; font-weight: 600; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(104, 116, 81, 0.2); }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { transition: none !important; animation: none !important; }
        }
    </style>
</head>
<body class="font-sans text-hb-offblack min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <!-- Zurück Button (Webseite) -->
    <a href="https://www.hausblick-fn.de" class="absolute top-6 left-6 md:top-10 md:left-10 flex items-center gap-2 text-sm font-bold text-gray-500 hover:text-hb-olive transition-colors z-20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Zurück zur Webseite
    </a>

    <!-- Dezente Hintergrund-Dekoration -->
    <div class="fixed top-[-10%] right-[-5%] w-[40vw] h-[40vw] bg-hb-olive/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="fixed bottom-[-10%] left-[-5%] w-[40vw] h-[40vw] bg-hb-orange/5 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Container -->
    <div class="w-full max-w-md bg-white p-8 md:p-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 relative z-10">
        <div class="text-center mb-8">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-16 w-auto mx-auto mb-4">
            <h1 class="text-[28px] font-bold tracking-tight text-hb-offblack">Mieterportal</h1>
            <p id="page-subtitle" class="text-[15px] text-gray-500 font-medium mt-1">Bitte loggen Sie sich ein</p>
        </div>

        <!-- Login-Formular -->
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1">E-Mail Adresse</label>
                <input type="email" id="email" class="w-full p-4 text-sm" placeholder="name@beispiel.de" required>
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1">Passwort</label>
                <input type="password" id="password" class="w-full p-4 text-sm" placeholder="••••••••" required>
            </div>

            <div id="error-msg" class="hidden bg-hb-error/12 text-hb-error text-xs font-bold p-3 rounded-2xl border border-hb-error/20 text-center"></div>

            <button type="submit" id="login-btn" class="w-full btn-primary py-4 text-sm mt-2">Einloggen</button>

            <div class="text-center pt-1">
                <button type="button" onclick="showForgotForm()" class="text-xs text-hb-olive font-medium hover:underline">Passwort vergessen?</button>
            </div>
        </form>

        <!-- Passwort-vergessen-Formular -->
        <form id="forgot-form" class="space-y-5 hidden">
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1">E-Mail Adresse</label>
                <input type="email" id="forgot-email" class="w-full p-4 text-sm" placeholder="name@beispiel.de" required>
            </div>

            <div id="forgot-success" class="hidden bg-hb-success/12 text-hb-success text-xs font-bold p-3 rounded-2xl border border-hb-success/20 text-center"></div>
            <div id="forgot-error" class="hidden bg-hb-error/12 text-hb-error text-xs font-bold p-3 rounded-2xl border border-hb-error/20 text-center"></div>

            <button type="submit" id="forgot-btn" class="w-full btn-primary py-4 text-sm">Reset-Link senden</button>

            <div class="text-center pt-1">
                <button type="button" onclick="showLoginForm()" class="text-xs text-hb-olive font-medium hover:underline">Zurück zum Login</button>
            </div>
        </form>

        <!-- Passwort-setzen-Formular (nach Einladung oder Reset) -->
        <form id="set-password-form" class="space-y-5 hidden">
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1">Neues Passwort</label>
                <input type="password" id="new-password" class="w-full p-4 text-sm" placeholder="Mindestens 8 Zeichen" required>
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1">Passwort bestätigen</label>
                <input type="password" id="new-password-confirm" class="w-full p-4 text-sm" placeholder="Passwort wiederholen" required>
            </div>

            <div id="set-pw-error" class="hidden bg-hb-error/12 text-hb-error text-xs font-bold p-3 rounded-2xl border border-hb-error/20 text-center"></div>

            <button type="submit" id="set-pw-btn" class="w-full btn-primary py-4 text-sm">Passwort festlegen</button>
        </form>

        <div id="hint-text" class="mt-8 text-center border-t border-gray-100 pt-6">
            <p class="text-xs text-gray-400 font-medium">Noch kein Zugang? Bitte kontaktieren Sie die Hausverwaltung oder Ihren Vermieter.</p>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://unprrlbvylmzxxhpfisr.supabase.co';
        const supabaseKey = 'sb_publishable_nWYozmRQq8E17z_ljZ2SHA_LUulwUV1';

        // Hash BEFORE Supabase client consumes it
        const rawHash = window.location.hash;
        const hashParams = new URLSearchParams(rawHash.slice(1));
        const urlType = hashParams.get('type'); // 'invite', 'recovery', 'magiclink'

        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // --- Form switching ---
        function showLoginForm() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('set-password-form').classList.add('hidden');
            document.getElementById('hint-text').classList.remove('hidden');
            document.getElementById('page-subtitle').textContent = 'Bitte loggen Sie sich ein';
        }

        function showForgotForm() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.remove('hidden');
            document.getElementById('set-password-form').classList.add('hidden');
            document.getElementById('hint-text').classList.add('hidden');
            document.getElementById('page-subtitle').textContent = 'Passwort zurücksetzen';
        }

        function showSetPasswordForm(isInvite) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('set-password-form').classList.remove('hidden');
            document.getElementById('hint-text').classList.add('hidden');
            document.getElementById('page-subtitle').textContent = isInvite
                ? 'Willkommen! Bitte legen Sie Ihr Passwort fest.'
                : 'Neues Passwort festlegen';
        }

        // --- Auth state: detect invite / recovery ---
        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                showSetPasswordForm(false);
            } else if (event === 'SIGNED_IN' && urlType === 'invite') {
                showSetPasswordForm(true);
            }
        });

        // --- Auto-redirect if already logged in (but NOT for invite/recovery flows) ---
        async function checkLogin() {
            if (urlType === 'invite' || urlType === 'recovery') return;
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) window.location.href = 'dashboard.html';
        }
        checkLogin();

        // --- Login ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errBox = document.getElementById('error-msg');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Lädt...';
            errBox.classList.add('hidden');

            const { data: _loginData, error } = await _supabase.auth.signInWithPassword({ email, password });
            console.log('[login] signInWithPassword →', 'user:', _loginData?.user?.email, 'session:', _loginData?.session ? 'OK' : 'NULL', 'error:', error?.message || 'none');

            if (error) {
                errBox.textContent = (error.message === 'Invalid login credentials')
                    ? 'Falsche E-Mail-Adresse oder Passwort.'
                    : 'Fehler: ' + error.message;
                errBox.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Einloggen';
            } else {
                window.location.href = 'dashboard.html';
            }
        });

        // --- Passwort vergessen ---
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('forgot-btn');
            const errBox = document.getElementById('forgot-error');
            const successBox = document.getElementById('forgot-success');
            const email = document.getElementById('forgot-email').value;

            btn.disabled = true;
            btn.textContent = 'Senden...';
            errBox.classList.add('hidden');
            successBox.classList.add('hidden');

            const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://portal.hausblick-fn.de/'
            });

            if (error) {
                errBox.textContent = 'Fehler: ' + error.message;
                errBox.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Reset-Link senden';
            } else {
                successBox.textContent = 'Reset-Link wurde gesendet. Bitte prüfen Sie Ihr Postfach.';
                successBox.classList.remove('hidden');
                btn.disabled = true;
                btn.textContent = 'Gesendet';
            }
        });

        // --- Passwort setzen (nach Einladung oder Reset) ---
        document.getElementById('set-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('set-pw-btn');
            const errBox = document.getElementById('set-pw-error');
            const pw1 = document.getElementById('new-password').value;
            const pw2 = document.getElementById('new-password-confirm').value;

            errBox.classList.add('hidden');

            if (pw1 !== pw2) {
                errBox.textContent = 'Passwörter stimmen nicht überein.';
                errBox.classList.remove('hidden');
                return;
            }
            if (pw1.length < 8) {
                errBox.textContent = 'Passwort muss mindestens 8 Zeichen haben.';
                errBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Speichern...';

            const { error } = await _supabase.auth.updateUser({ password: pw1 });

            if (error) {
                errBox.textContent = 'Fehler: ' + error.message;
                errBox.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Passwort festlegen';
            } else {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
