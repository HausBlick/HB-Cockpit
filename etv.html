<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieterportal | Eigentümerversammlung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hb-olive':      '#687451',
                        'hb-offblack':   '#373737',
                        'hb-ultralight': '#F9FAF8',
                        'hb-orange':     '#EB762D'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { 'lg': '15px', 'xl': '15px', '2xl': '15px' },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.03)' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F9FAF8; font-size: 16px; color: #373737; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .nav-link { border-radius: 12px; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; color: #687451; }
        .nav-link:hover { background-color: #f3f4f6; color: #687451; }
        .active-link { background-color: #687451 !important; color: white !important; }
        .nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; color: #9ca3af; padding: 24px 16px 8px 16px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); border: 1px solid rgba(104, 116, 81, 0.2); overflow: hidden; }
        .dropdown-open { display: block !important; animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        body input, body select, body textarea { border-radius: 15px; background-color: #F9FAF8; border: 1px solid #e5e7eb; transition: all 0.2s; padding: 10px 16px; width: 100%; height: 40px; font-size: 14px; }
        body textarea { height: auto; min-height: 80px; padding: 10px 16px; }
        input:focus, select:focus, textarea:focus { background-color: white; border-color: #687451; outline: none; box-shadow: 0 0 0 3px rgba(104, 116, 81, 0.1); }
        input[type="checkbox"] { width: auto; accent-color: #687451; width: 1.2rem; height: 1.2rem; cursor: pointer; border-radius: 4px; }
        .btn-primary { background-color: #687451; color: white; border-radius: 12px; transition: all 0.2s; font-weight: 600; padding: 12px 24px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary:hover { background-color: #555f42; transform: translateY(-1px); }
        .btn-secondary { background-color: #e5e7eb; color: #374151; border-radius: 12px; transition: all 0.2s; font-weight: 600; padding: 12px 24px; cursor: pointer; }
        .badge-eigentuemer  { background-color: #eef0eb; color: #687451; border-color: #c4ccb8; }
        .badge-mieter       { background-color: #fdf1e8; color: #c4601e; border-color: #f5c9a0; }
        .badge-dienstleister{ background-color: #f3f3f3; color: #555555; border-color: #d4d4d4; }
        .badge-beirat       { background-color: #e8ebe4; color: #4a5337; border-color: #b5bfab; }
        .nav-link { display: flex; align-items: center; gap: 0.5rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-sheet { transition: transform 0.3s ease-out; }
        .modal-inner { transition: transform 0.2s ease-out, opacity 0.2s ease-out; }
        .bnav-item { color: #9ca3af; transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
        .bnav-item.bnav-active { color: #687451; }
        .bnav-item .bnav-dot { display: none; width: 4px; height: 4px; border-radius: 50%; background: #687451; margin-top: 2px; }
        .bnav-item.bnav-active .bnav-dot { display: block; }
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            #bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
        }
        @media (max-width: 767px) {
            .rtable table, .rtable thead, .rtable tbody, .rtable th, .rtable tr, .rtable td { display: block; }
            .rtable thead { position: absolute; left: -9999px; }
            .rtable tbody tr { background: white; border-radius: 15px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid rgba(104,116,81,0.15); box-shadow: 0 2px 8px -2px rgba(0,0,0,0.04); }
            .rtable tbody tr:active { background: #f9faf8; }
            .rtable td { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border: none !important; font-size: 14px; min-height: 28px; }
            .rtable td::before { content: attr(data-label); font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.03em; flex-shrink: 0; margin-right: 12px; }
            .rtable td.td-action { justify-content: flex-end; padding-top: 8px; margin-top: 4px; border-top: 1px solid rgba(104,116,81,0.08) !important; }
            .rtable td.td-action::before { display: none; }
            .rtable td.td-hide-mobile { display: none; }
            .rtable .overflow-x-auto { overflow-x: visible; }
        }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: sk-shimmer 1.5s ease-in-out infinite; border-radius: 15px; }
        @keyframes sk-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="font-sans flex flex-col md:flex-row text-left relative overflow-hidden" style="height:100vh;height:100dvh" onclick="closeDropdowns(event)">

    <div id="toast-container" class="fixed bottom-20 md:bottom-6 right-4 md:right-6 z-50 flex flex-col gap-3 pointer-events-none text-left"></div>

    <!-- Sidebar -->
    <nav id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 z-40 w-72 bg-white border-r border-gray-100 flex-shrink-0 h-screen flex flex-col shadow-soft text-left">
        <a href="dashboard.html"
            class="p-8 pb-4 hidden md:block text-center border-b border-gray-50 mb-4 cursor-pointer hover:bg-gray-50/50 transition-colors">
            <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-10 w-auto mx-auto mb-2">
            <div class="font-extrabold text-xl tracking-tighter text-hb-olive">Mieterportal</div>
            <p class="text-[10px] uppercase tracking-widest font-bold text-gray-400">HB Verwaltung</p>
        </a>
        <div class="flex-grow p-4 overflow-y-auto chat-scroll">
            <ul class="space-y-1" id="nav-links"></ul>
        </div>
    </nav>
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-hb-offblack/20 backdrop-blur-sm z-30 hidden text-left"></div>

    <!-- Main -->
    <main class="flex-1 min-h-0 overflow-hidden relative flex flex-col text-left">
        <header class="px-4 py-2 md:py-4 md:px-6 flex justify-between items-center flex-shrink-0 bg-white md:bg-hb-ultralight/80 border-b border-gray-100 md:border-b-0 md:backdrop-blur-md z-30 text-left">
            <a href="dashboard.html" class="md:hidden font-bold text-lg tracking-tight text-hb-olive flex items-center gap-2 cursor-pointer">
                <img src="HB_icon_olive_RGB.svg" alt="HB Logo" class="h-7 w-auto">
                Mieterportal
            </a>
            <div class="hidden md:block text-left">
                <p id="role-label" class="text-xs uppercase tracking-widest font-bold text-hb-orange"></p>
            </div>
            <div class="relative dropdown-container text-left">
                <button onclick="toggleUserDropdown(event)" class="flex items-center gap-2 bg-white p-1 pr-2 md:p-1.5 md:pr-3 rounded-full border border-gray-200 shadow-sm hover:border-hb-olive transition-colors">
                    <div id="user-avatar" class="w-8 h-8 md:w-9 md:h-9 bg-hb-olive text-white rounded-full flex items-center justify-center font-bold text-xs md:text-sm uppercase">?</div>
                    <svg class="w-3.5 h-3.5 md:w-4 md:h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-gray-100 z-50 overflow-hidden text-left">
                    <div class="p-4 border-b border-gray-50 text-left">
                        <p class="text-sm font-bold truncate text-left" id="dropdown-name">Name</p>
                        <p class="text-xs text-gray-400 truncate text-left" id="dropdown-email">email</p>
                    </div>
                    <a href="dashboard.html?m=loadProfile" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 flex items-center gap-3 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        Profil bearbeiten
                    </a>
                    <button onclick="logout()" class="w-full text-left px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 flex items-center gap-3 border-t border-gray-50 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        Abmelden
                    </button>
                </div>
            </div>
        </header>
        <div id="content-area" class="flex-1 min-h-0 px-4 md:px-10 pb-6 md:pb-10 overflow-y-auto text-left"></div>
        <!-- Bottom Navigation (Mobile) -->
        <nav id="bottom-nav" class="md:hidden flex-shrink-0 bg-white border-t border-gray-100 flex justify-around items-center" style="min-height:56px"></nav>
    </main>

    <!-- JS: ETV-Modul + PDF-Engine -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
    <script src="js/config.js?v=20260401d"></script>
    <script src="js/utils.js?v=20260401d"></script>
    <script src="js/utils-pdf.js?v=20260401e"></script>
    <script src="js/modules/mod-etv.js?v=20260401d"></script>
    <script src="js/nav.js?v=20260401d"></script>

</body>
</html>
